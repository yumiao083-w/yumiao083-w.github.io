<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>语音通话</title>
    <style>
        /* 引入苹果系默认字体 */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --btn-bg: rgba(255, 255, 255, 0.15);
            --btn-bg-active: #ffffff;
            --btn-icon-active: #000000;
            --system-green: #34c759;
            --system-red: #ff3b30;
            --system-blue: #0a84ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; 
            background: var(--bg-color); 
            color: var(--text-primary); 
            height: 100vh; 
            height: 100dvh; /* 适配移动端浏览器动态高度 */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* 纯黑背景上添加隐约的渐变光效，模拟 iOS 景深 */
        .background-blur {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 20%, rgba(40, 40, 50, 0.6), transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* 顶部栏 */
        .top-bar { 
            position: relative;
            z-index: 10;
            padding: 20px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding-top: max(20px, env(safe-area-inset-top));
        }
        
        .back-btn { 
            color: var(--system-blue); 
            font-size: 17px; 
            text-decoration: none; 
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .top-right { width: 60px; display: flex; justify-content: flex-end; }
        .settings-icon { width: 40px; height: 40px; border: none; background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.6; }
        .settings-icon:hover { opacity: 1; }
        .settings-icon svg { width: 22px; height: 22px; fill: currentColor; }

        /* 设置弹窗 */
        .settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .settings-modal.show { display: flex; }
        .settings-panel { background: #1c1c1e; border-radius: 16px; padding: 24px; width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto; }
        .settings-panel h3 { font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: center; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .setting-item:last-child { border-bottom: none; }
        .setting-label { font-size: 15px; color: #fff; flex: 1; }
        .setting-desc { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .setting-toggle { position: relative; width: 44px; height: 26px; background: #39393d; border-radius: 13px; cursor: pointer; border: none; transition: background 0.2s; flex-shrink: 0; margin-left: 12px; }
        .setting-toggle.on { background: #34c759; }
        .setting-toggle .knob { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: left 0.2s; }
        .setting-toggle.on .knob { left: 20px; }
        .settings-btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .settings-btn-row button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
        .btn-save-settings { background: #0a84ff; color: #fff; }
        .btn-close-settings { background: #39393d; color: #fff; }

        /* 头像与来电信息区 */
        .caller-info { 
            position: relative;
            z-index: 10;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 2vh;
            gap: 12px;
        }
        
        .avatar-area {
            position: relative;
            margin-bottom: 10px;
        }

        /* 更改为苹果默认的灰色头像风格 */
        .avatar { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: linear-gradient(180deg, #b0b0b5 0%, #8e8e93 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            font-weight: 500;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
        }
        
        .caller-name { 
            font-size: 34px; 
            font-weight: 400; 
            letter-spacing: 0.5px;
        }
        
        .call-status-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 24px;
        }

        .call-status, .call-timer { 
            font-size: 17px; 
            color: var(--text-secondary); 
            font-weight: 400;
        }
        
        .call-timer {
            display: none; /* 默认隐藏，接通后显示 */
        }

        /* 波纹动画 (重新调整得更像 iOS 柔和的波纹) */
        .ripple-container { position: relative; width: 100px; height: 100px; }
        .ripple { 
            position: absolute; 
            inset: -10px; 
            border-radius: 50%; 
            background: rgba(142, 142, 147, 0.4); /* 跟随灰色背景调整波纹颜色 */
            animation: none; 
            z-index: 1;
            opacity: 0;
        }
        .listening .ripple { animation: ripple 2s cubic-bezier(0.2, 0.8, 0.4, 1) infinite; }
        .listening .ripple:nth-child(2) { animation-delay: 0.6s; }
        .listening .ripple:nth-child(3) { animation-delay: 1.2s; }
        @keyframes ripple { 
            0% { transform: scale(0.8); opacity: 1; } 
            100% { transform: scale(1.8); opacity: 0; } 
        }

        /* 字幕区 (类似于 iOS 17 Live Voicemail 效果) */
        .subtitle-area { 
            position: relative;
            z-index: 10;
            flex: 1; 
            min-height: 0; /* 关键修复：防止 flex 子元素在小屏被撑开导致溢出 */
            padding: 20px 24px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center; 
            width: 100%;
        }
        .subtitle-scroll {
            width: 100%;
            height: 100%; /* 占满区域以允许内部滚动 */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding-bottom: 10px;
        }
        
        .subtitle-text { 
            font-size: 22px; 
            font-weight: 400;
            line-height: 1.4; 
            color: var(--text-primary); 
            transition: all 0.3s ease;
        }
        .subtitle-text.user-text { 
            color: var(--text-secondary); 
            font-size: 18px; 
        }
        
        .status-line { font-size: 13px; color: var(--text-secondary); opacity: 0.8; margin-top: 8px; }
        .stats-line { font-size: 11px; color: #777; margin-top: 2px; } /* 稍微调亮一点日志颜色 */

        /* 控制栏整体 */
        .bottom-section {
            position: relative;
            z-index: 10;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .hint { 
            font-size: 13px; 
            color: var(--text-secondary); 
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* 操作按钮网格 */
        .controls-grid { 
            display: flex; 
            justify-content: center; 
            gap: 40px;
            margin-bottom: 30px;
        }
        
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .action-label {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 400;
        }

        /* 圆形按钮统一样式 */
        .ctrl-btn { 
            width: 72px; 
            height: 72px; 
            border-radius: 50%; 
            border: none; 
            background: var(--btn-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-primary); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.4, 1); 
        }
        
        .ctrl-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
            transition: all 0.2s ease;
        }

        .ctrl-btn:active { transform: scale(0.9); }
        
        /* 激活状态 */
        .ctrl-btn.active { 
            background: var(--btn-bg-active); 
            color: var(--btn-icon-active); 
        }

        /* 独立处理静音图标切换 */
        .icon-mic-slash { display: none; }
        .btn-mute.active .icon-mic { display: none; }
        .btn-mute.active .icon-mic-slash { display: block; }

        /* 拨打/挂断大按钮 */
        .btn-call { 
            width: 76px; 
            height: 76px; 
            border-radius: 50%; 
            background: var(--system-green); 
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-call svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        .btn-call:active { transform: scale(0.9); }
        
        /* 挂断状态：变红并旋转图标 135度 */
        .btn-call.active { 
            background: var(--system-red); 
        }
        .btn-call.active svg {
            transform: rotate(135deg);
        }

        /* 文字输入区 */
        .text-input-area { 
            width: 100%;
            padding: 0 24px 15px; 
            position: relative;
            z-index: 10;
        }
        
        .input-wrapper {
            display: flex; 
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 8px;
            border-radius: 30px;
        }

        .text-input-area input {
            flex: 1; 
            padding: 10px 16px; 
            border: none; 
            background: transparent; 
            color: #fff; 
            font-size: 16px; 
            outline: none;
        }
        .text-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .text-input-area button {
            padding: 8px 18px; 
            background: var(--system-blue); 
            color: #fff; 
            border: none; 
            border-radius: 20px; 
            font-size: 15px; 
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .text-input-area button:active {
            opacity: 0.7;
        }

        /* 连接状态指示点 */
        .conn-dot { 
            width: 6px; 
            height: 6px; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 6px; 
            vertical-align: middle;
            margin-top: -2px;
        }
        .conn-dot.connected { background: var(--system-green); }
        .conn-dot.disconnected { background: var(--system-red); }
        .conn-dot.connecting { background: #ff9f0a; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* ========= 小屏幕设备（如普通手机竖屏）适配 ========= */
        @media (max-height: 700px) {
            .caller-info { margin-top: 1vh; gap: 8px; }
            .avatar { width: 80px; height: 80px; font-size: 32px; }
            .ripple-container { width: 80px; height: 80px; }
            .caller-name { font-size: 28px; }
            .subtitle-area { padding: 10px 20px; gap: 8px; }
            .subtitle-text { font-size: 18px; }
            .subtitle-text.user-text { font-size: 16px; }
            .controls-grid { gap: 30px; margin-bottom: 20px; }
            .ctrl-btn { width: 60px; height: 60px; }
            .ctrl-btn svg { width: 24px; height: 24px; }
            .btn-call { width: 68px; height: 68px; }
            .btn-call svg { width: 32px; height: 32px; }
            .hint { margin-bottom: 16px; }
            .bottom-section { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        }

        /* ========= 视图切换 ========= */
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        /* 底部 Tab 栏 */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 4px; cursor: pointer; color: #8e8e93; transition: color 0.2s; text-decoration: none; }
        .tab-item.active { color: #0a84ff; }
        .tab-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 2px; }
        .tab-item span { font-size: 10px; font-weight: 500; }

        /* 最近通话列表 */
        .recents-view { padding-top: max(20px, env(safe-area-inset-top)); }
        .recents-header { padding: 16px 20px 8px; font-size: 34px; font-weight: 700; }
        .recents-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .recent-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: background 0.15s; }
        .recent-item:active { background: rgba(255,255,255,0.08); }
        .recent-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(180deg, #b0b0b5, #8e8e93); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; flex-shrink: 0; margin-right: 14px; }
        .recent-info { flex: 1; min-width: 0; }
        .recent-name { font-size: 17px; font-weight: 400; }
        .recent-detail { font-size: 13px; color: #8e8e93; margin-top: 2px; }
        .recent-time { font-size: 13px; color: #8e8e93; flex-shrink: 0; margin-left: 8px; }
        .recents-empty { text-align: center; color: #8e8e93; padding: 60px 20px; font-size: 15px; }

        /* 拨号视图 */
        .dial-view { align-items: center; justify-content: center; padding-top: max(20px, env(safe-area-inset-top)); }
        .dial-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(180deg, #b0b0b5, #8e8e93); display: flex; align-items: center; justify-content: center; font-size: 48px; color: #fff; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .dial-name { font-size: 28px; font-weight: 400; margin-bottom: 8px; }
        .dial-hint { font-size: 15px; color: #8e8e93; margin-bottom: 40px; }
        .dial-btn { width: 76px; height: 76px; border-radius: 50%; background: #34c759; border: none; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.2s; }
        .dial-btn:active { transform: scale(0.9); }
        .dial-btn svg { width: 36px; height: 36px; fill: currentColor; }

        /* 通话记录详情弹窗 */
        .log-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .log-modal.show { display: flex; }
        .log-panel { background: #1c1c1e; border-radius: 16px; width: 92%; max-width: 420px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
        .log-header { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .log-header h3 { font-size: 17px; font-weight: 600; }
        .log-header button { background: none; border: none; color: #0a84ff; font-size: 16px; cursor: pointer; }
        .log-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .log-msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .log-msg.user { align-self: flex-end; background: #0a84ff; color: #fff; border-bottom-right-radius: 4px; }
        .log-msg.ai { align-self: flex-start; background: #2c2c2e; color: #fff; border-bottom-left-radius: 4px; }
        .log-meta { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: #8e8e93; text-align: center; flex-shrink: 0; }

    </style>
</head>
<body>
    <div class="background-blur"></div>

    <!-- ======= 视图1: 最近通话 ======= -->
    <div class="view active" id="viewRecents">
        <div class="recents-header">最近通话</div>
        <div class="recents-list" id="recentsList">
            <div class="recents-empty">暂无通话记录</div>
        </div>
    </div>

    <!-- ======= 视图2: 拨号 ======= -->
    <div class="view" id="viewDial">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div class="dial-avatar">袁</div>
            <div class="dial-name">袁朗</div>
            <div class="dial-hint">语音通话</div>
            <button class="dial-btn" onclick="startCall()">
                <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
            </button>
        </div>
    </div>

    <!-- ======= 视图3: 通话中 ======= -->
    <div class="view" id="viewCall">

    <div class="top-bar">
        <a href="javascript:void(0)" class="back-btn" onclick="if(isInCall){toggleCall()}else{switchView('recents')}">
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            返回
        </a>
        <div class="top-right">
            <button class="settings-icon" onclick="openSettings()" title="设置">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-panel">
            <h3>语音通话设置</h3>
            <div class="setting-item">
                <div>
                    <div class="setting-label">共享微信上下文</div>
                    <div class="setting-desc">通话时读取微信聊天记录</div>
                </div>
                <button class="setting-toggle" id="tog-wechat-ctx" onclick="toggleSetting(this)"><div class="knob"></div></button>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">世界书</div>
                    <div class="setting-desc">通话时注入世界书设定</div>
                </div>
                <button class="setting-toggle" id="tog-world-info" onclick="toggleSetting(this)"><div class="knob"></div></button>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">记忆检索</div>
                    <div class="setting-desc">根据对话内容检索相关记忆</div>
                </div>
                <button class="setting-toggle" id="tog-memory-retrieval" onclick="toggleSetting(this)"><div class="knob"></div></button>
            </div>
            <div class="settings-btn-row">
                <button class="btn-close-settings" onclick="closeSettings()">关闭</button>
                <button class="btn-save-settings" onclick="saveSettings()">保存</button>
            </div>
            <div id="settingsStatus" style="text-align:center; font-size:13px; color:#8e8e93; margin-top:12px;"></div>
        </div>
    </div>

    <div class="caller-info">
        <div class="avatar-area">
            <div class="ripple-container" id="rippleContainer">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="avatar">袁</div>
            </div>
        </div>
        <div class="caller-name">袁朗</div>
        
        <div class="call-status-wrapper">
            <div class="call-status" id="callStatus"><span class="conn-dot disconnected" id="connDot"></span>未连接</div>

// =====================================================================
//  视图切换 + 通话记录

function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    
    if (name === 'recents') {
        document.getElementById('viewRecents').classList.add('active');
        document.querySelectorAll('.tab-item')[0].classList.add('active');
        loadCallLogs();
    } else if (name === 'dial') {
        document.getElementById('viewDial').classList.add('active');
        document.querySelectorAll('.tab-item')[1].classList.add('active');
    } else if (name === 'call') {
        document.getElementById('viewCall').classList.add('active');
        document.getElementById('tabBar').style.display = 'none';
    }
    
    if (name !== 'call') {
        document.getElementById('tabBar').style.display = 'flex';
    }
}

function startCall() {
    switchView('call');
    // 自动开始通话
    if (!isInCall) toggleCall();
}

function formatDuration(seconds) {
    if (!seconds) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    const now = new Date();
    const today = now.toDateString();
    const dateStr = d.toDateString();
    
    const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    if (dateStr === today) return time;
    
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (dateStr === yesterday.toDateString()) return '昨天 ' + time;
    
    return d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }) + ' ' + time;
}

function loadCallLogs() {
    fetch('/api/voice/logs')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('recentsList');
            if (!data.logs || data.logs.length === 0) {
                list.innerHTML = '<div class="recents-empty">暂无通话记录</div>';
                return;
            }
            list.innerHTML = data.logs.map(log => `
                <div class="recent-item" onclick="showLogDetail('${log.filename}')">
                    <div class="recent-avatar">袁</div>
                    <div class="recent-info">
                        <div class="recent-name">袁朗</div>
                        <div class="recent-detail">${log.rounds}轮对话 · ${formatDuration(log.duration_seconds)}</div>
                    </div>
                    <div class="recent-time">${formatTime(log.start_time)}</div>
                </div>
            `).join('');
        })
        .catch(() => {
            document.getElementById('recentsList').innerHTML = '<div class="recents-empty">加载失败</div>';
        });
}

function showLogDetail(filename) {
    currentLogFilename = filename;
    fetch('/api/voice/log/' + filename)
        .then(r => r.json())
        .then(data => {
            if (data.error) return;
            
            document.getElementById('logTitle').textContent = formatTime(data.start_time) + ' 通话';
            
            const msgs = document.getElementById('logMessages');
            msgs.innerHTML = (data.messages || []).map(m => 
                `<div class="log-msg ${m.role === 'user' ? 'user' : 'ai'}">${cleanVoiceTags(m.content)}</div>`
            ).join('');
            
            document.getElementById('logMeta').textContent = 
                `${data.rounds || 0}轮对话 · 通话时长 ${formatDuration(data.duration_seconds)}`;
            
            document.getElementById('logModal').classList.add('show');
            // 滚动到底部
            setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 100);
        });
}

let currentLogFilename = null;
let isLogEditing = false;

function closeLogModal() {
    document.getElementById('logModal').classList.remove('show');
    isLogEditing = false;
    document.getElementById('logActions').style.display = 'none';
    document.getElementById('logEditBtn').textContent = '编辑';
}

function toggleLogEdit() {
    isLogEditing = !isLogEditing;
    const msgs = document.getElementById('logMessages');
    const actions = document.getElementById('logActions');
    const btn = document.getElementById('logEditBtn');
    
    if (isLogEditing) {
        btn.textContent = '取消';
        actions.style.display = 'block';
        // 把消息变成可编辑
        msgs.querySelectorAll('.log-msg').forEach(el => {
            el.contentEditable = 'true';
            el.style.outline = '1px dashed rgba(255,255,255,0.2)';
            el.style.cursor = 'text';
        });
    } else {
        btn.textContent = '编辑';
        actions.style.display = 'none';
        msgs.querySelectorAll('.log-msg').forEach(el => {
            el.contentEditable = 'false';
            el.style.outline = 'none';
            el.style.cursor = 'default';
        });
    }
}

function saveLogEdit() {
    if (!currentLogFilename) return;
    const msgs = document.getElementById('logMessages').querySelectorAll('.log-msg');
    const messages = Array.from(msgs).map(el => ({
        role: el.classList.contains('user') ? 'user' : 'assistant',
        content: el.textContent.trim(),
    })).filter(m => m.content);
    
    fetch('/api/voice/log/' + currentLogFilename, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ messages })
    })
    .then(r => r.json())
    .then(result => {
        if (result.error) { alert('保存失败: ' + result.error); return; }
        toggleLogEdit();
        loadCallLogs();
    })
    .catch(e => alert('保存失败: ' + e.message));
}

function deleteLog() {
    if (!currentLogFilename || !confirm('确定删除这条通话记录？')) return;
    
    fetch('/api/voice/log/' + currentLogFilename, { method: 'DELETE' })
    .then(r => r.json())
    .then(result => {
        if (result.error) { alert('删除失败: ' + result.error); return; }
        closeLogModal();
        loadCallLogs();
    })
    .catch(e => alert('删除失败: ' + e.message));
}

// =====================================================================
//  工具函数
// =====================================================================
function cleanVoiceTags(text) {
    // 去掉语气词标签 (laughs) (sighs) 等
    let clean = text.replace(/\((laughs|chuckle|coughs|clear-throat|groans|breath|pant|inhale|exhale|gasps|sniffs|sighs|snorts|burps|lip-smacking|humming|hissing|emm|sneezes)\)/gi, '');
    // 去掉停顿标签 <#0.5#>
    clean = clean.replace(/<#[\d.]+#>/g, '');
    // 合并多余空格
    clean = clean.replace(/\s{2,}/g, ' ').trim();
    return clean;
}

// =====================================================================
//  状态
// =====================================================================
let ws = null;
let isInCall = false;
let isMuted = false;
let audioQueue = [];           // 待播放音频队列
let isPlaying = false;
let isAiSpeaking = false;      // AI 正在回复中（从收到第一个 text_delta 到所有音频播完）
let callStartTime = null;
let timerInterval = null;
let currentAiText = "";        // 当前 AI 回复累积文本
let hasVoiceActivity = false;  // 本轮录音中是否检测到人声
let voiceFrameCount = 0;       // 有声帧计数
let isListening = false;       // 正在识别中
let pendingUserText = "";      // 用户正在说的文字（中间结果）
let useSSE = true;             // 默认使用 SSE 模式（Flask 内置服务器不支持 WebSocket）
let sessionId = 'vc_' + Date.now();

// =====================================================================
//  WebSocket / SSE 连接
// =====================================================================
function connect() {
    // 先尝试 WebSocket，失败则降级 SSE
    if (useSSE) {
        // 已经降级过，直接用 SSE
        updateStatus('connected', '已连接');
        startListening();
        return;
    }

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws/voice`;

    updateStatus('connecting', '连接中...');

    try {
        ws = new WebSocket(url);
    } catch(e) {
        console.warn('WebSocket 创建失败，降级 SSE:', e);
        useSSE = true;
        updateStatus('connected', '已连接');
        startListening();
        return;
    }

    let wsConnected = false;

    ws.onopen = () => {
        wsConnected = true;
        updateStatus('connected', '已连接');
        startListening();
    };

    ws.onmessage = (e) => {
        handleMessage(JSON.parse(e.data));
    };

    ws.onerror = (err) => {
        console.warn('WebSocket error, 降级到 SSE 模式');
        if (!wsConnected) {
            // 从未成功连接过，降级 SSE
            useSSE = true;
            ws = null;
            updateStatus('connected', '已连接');
            startListening();
        }
    };

    ws.onclose = () => {
        if (useSSE) return;
        if (isInCall && wsConnected) {
            updateStatus('disconnected', '连接断开，重连中...');
            setTimeout(connect, 2000);
        } else if (isInCall && !wsConnected) {
            // WebSocket 连不上，降级
            useSSE = true;
            updateStatus('connected', '已连接');
            startListening();
        }
    };
}

function disconnect() {
    if (ws) {
        try { ws.send(JSON.stringify({type: 'end'})); } catch(e) {}
        ws.close();
        ws = null;
    }
}

function sendText(text) {
    if (useSSE) {
        sendTextSSE(text);
        return;
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'chat', text }));
    }
}

// ── SSE 降级模式 ──
function sendTextSSE(text) {
    fetch('/api/voice/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, session_id: sessionId })
    }).then(resp => {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        function pump() {
            reader.read().then(({done, value}) => {
                if (done) return;
                buf += decoder.decode(value, {stream: true});
                const lines = buf.split('\n');
                buf = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') return;
                        try { handleMessage(JSON.parse(data)); } catch(e) {}
                    }
                }
                pump();
            });
        }
        pump();
    }).catch(err => {
        console.error('SSE error:', err);
    });
}

// =====================================================================
//  消息处理
// =====================================================================
function handleMessage(msg) {
    switch (msg.type) {
        case 'user_confirmed':
            document.getElementById('userSubtitle').textContent = '你: ' + msg.text;
            document.getElementById('statusLine').textContent = '已收到，正在处理...';
            // AI 开始处理，立刻停止录音
            isAiSpeaking = true;
            pauseListening();
            break;

        case 'status':
            document.getElementById('statusLine').textContent = msg.message || '';
            break;

        case 'text_delta':
            currentAiText += msg.text;
            document.getElementById('aiSubtitle').textContent = cleanVoiceTags(currentAiText);
            break;

        case 'audio':
            audioQueue.push({
                audio: msg.audio,
                text: msg.text,
                index: msg.index,
            });
            playNext();
            break;

        case 'done':
            document.getElementById('statusLine').textContent = '';
            if (msg.stats) {
                let s = msg.stats;
                let info = `总耗时 ${s.total_time}s`;
                if (s.first_token_time) info += ` | 首token ${s.first_token_time}s`;
                info += ` | LLM ${s.llm_time}s | ${s.sentences}句TTS`;
                document.getElementById('statsLine').textContent = info;
            }
            // 如果没有音频在播放，恢复录音
            if (!isPlaying && audioQueue.length === 0) {
                isAiSpeaking = false;
                resumeListening();
            }
            break;

        case 'tts_error':
            console.warn('TTS error:', msg.message);
            document.getElementById('statusLine').textContent = '⚠️ 语音合成失败: ' + msg.text;
            break;

        case 'error':
            document.getElementById('aiSubtitle').textContent = '⚠️ ' + msg.message;
            document.getElementById('statusLine').textContent = '';
            resumeListening();
            break;

        case 'pong':
            break;
    }
}

// =====================================================================
//  音频播放队列
// =====================================================================
function playNext() {
    if (isPlaying || audioQueue.length === 0) return;
    isPlaying = true;

    const item = audioQueue.shift();
    const audioData = Uint8Array.from(atob(item.audio), c => c.charCodeAt(0));
    const blob = new Blob([audioData], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);

    const audio = new Audio(url);
    audio.volume = 1.0;

    audio.onended = () => {
        URL.revokeObjectURL(url);
        isPlaying = false;
        if (audioQueue.length > 0) {
            playNext();
        } else {
            // 所有音频播完，恢复语音识别
            isAiSpeaking = false;
            resumeListening();
        }
    };

    audio.onerror = () => {
        URL.revokeObjectURL(url);
        isPlaying = false;
        if (audioQueue.length > 0) {
            playNext();
        } else {
            isAiSpeaking = false;
            resumeListening();
        }
    };

    // AI 说话期间始终暂停录音
    pauseListening();
    audio.play().catch(e => {
        console.error('播放失败:', e);
        isPlaying = false;
        playNext();
    });
}

// =====================================================================
//  语音识别（MediaRecorder 录音 + 后端 Whisper）
//  兼容所有现代浏览器，不限 Chrome
// =====================================================================
let mediaRecorder = null;
let audioChunks = [];
let mediaStream = null;
let silenceTimer = null;           // 静音检测定时器
let audioContext = null;
let analyser = null;
let silenceStart = null;
const SILENCE_THRESHOLD = 15;      // 音量阈值（0-255）
const SILENCE_DURATION = 1500;     // 静默多久自动停止（毫秒）
const MIN_RECORD_TIME = 500;       // 最短录音时间（毫秒）
let recordStartTime = 0;

function initRecognition() {
    // 检查浏览器是否支持 MediaRecorder
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        document.getElementById('hint').textContent = '⚠️ 浏览器不支持录音';
        return false;
    }

    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaStream = stream;

            // 初始化音量分析（用于静音检测）
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);

            document.getElementById('hint').textContent = '🎤 麦克风就绪，说话自动识别';
            // 立即开始第一轮录音
            startRecording();
        })
        .catch(err => {
            console.error('麦克风权限获取失败:', err);
            document.getElementById('hint').textContent = '⚠️ 麦克风权限被拒绝，请打字输入';
        });

    return true;
}

function startRecording() {
    if (!mediaStream || !isInCall || isMuted || isAiSpeaking) return;

    audioChunks = [];
    recordStartTime = Date.now();
    hasVoiceActivity = false;
    voiceFrameCount = 0;

    // 选择浏览器支持的格式
    let mimeType = 'audio/webm;codecs=opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'audio/webm';
    }
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'audio/mp4';
    }
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = '';  // 让浏览器自己选
    }

    try {
        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : {});
    } catch(e) {
        console.error('MediaRecorder 创建失败:', e);
        return;
    }

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            audioChunks.push(e.data);
        }
    };

    mediaRecorder.onstop = () => {
        const recordDuration = Date.now() - recordStartTime;
        if (recordDuration < MIN_RECORD_TIME || audioChunks.length === 0) {
            // 录音太短，重新开始
            if (isInCall && !isMuted && !isPlaying && !isAiSpeaking) {
                setTimeout(() => startRecording(), 200);
            }
            return;
        }

        // VAD 检查：没检测到人声直接丢弃，不发后端
        if (!hasVoiceActivity) {
            console.log('VAD: 未检测到人声，跳过识别');
            audioChunks = [];
            if (isInCall && !isMuted && !isPlaying && !isAiSpeaking) {
                setTimeout(() => startRecording(), 200);
            }
            return;
        }

        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        audioChunks = [];

        if (blob.size < 1000) {
            // 文件太小，可能是空录音
            if (isInCall && !isMuted && !isPlaying) {
                setTimeout(() => startRecording(), 200);
            }
            return;
        }

        // 发送到后端识别
        document.getElementById('userSubtitle').textContent = '🎤 识别中...';
        document.getElementById('statusLine').textContent = '语音识别中...';

        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        fetch('/api/voice/recognize', {
            method: 'POST',
            body: formData,
        })
        .then(r => r.json())
        .then(result => {
            if (result.error) {
                document.getElementById('statusLine').textContent = '⚠️ ' + result.error;
                // 继续录音
                if (isInCall && !isMuted && !isPlaying) {
                    setTimeout(() => startRecording(), 500);
                }
                return;
            }

            const text = result.text?.trim();
            if (!text) {
                document.getElementById('userSubtitle').textContent = '';
                document.getElementById('statusLine').textContent = '';
                // 空识别结果，继续录音
                if (isInCall && !isMuted && !isPlaying) {
                    setTimeout(() => startRecording(), 200);
                }
                return;
            }

            // 识别成功，发送给 AI
            let info = `识别耗时 ${result.time || '?'}s`;
            document.getElementById('userSubtitle').textContent = '你: ' + text;
            document.getElementById('statusLine').textContent = info + ' | 发送中...';
            document.getElementById('statsLine').textContent = '';
            currentAiText = "";
            document.getElementById('aiSubtitle').textContent = "";
            sendText(text);
        })
        .catch(err => {
            console.error('语音识别请求失败:', err);
            document.getElementById('statusLine').textContent = '⚠️ 网络错误';
            if (isInCall && !isMuted && !isPlaying) {
                setTimeout(() => startRecording(), 1000);
            }
        });
    };

    mediaRecorder.start(100);  // 每 100ms 收集一次数据
    isListening = true;
    document.getElementById('rippleContainer').classList.add('listening');
    document.getElementById('hint').textContent = '正在聆听...';
    silenceStart = null;

    // 启动静音检测
    startSilenceDetection();
}

function startSilenceDetection() {
    if (silenceTimer) clearInterval(silenceTimer);

    silenceTimer = setInterval(() => {
        if (!analyser || !mediaRecorder || mediaRecorder.state !== 'recording') {
            clearInterval(silenceTimer);
            return;
        }

        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const volume = data.reduce((a, b) => a + b, 0) / data.length;

        if (volume > SILENCE_THRESHOLD) {
            // 有声音 → 记录有人声
            silenceStart = null;
            voiceFrameCount++;
            if (voiceFrameCount >= 3) {
                // 连续 3 帧以上有声音才算有人声（过滤瞬间噪声）
                hasVoiceActivity = true;
            }
        } else {
            // 静音
            if (!silenceStart) {
                silenceStart = Date.now();
            } else if (Date.now() - silenceStart > SILENCE_DURATION) {
                // 静默超过阈值，且已经录了足够长的时间
                if (Date.now() - recordStartTime > MIN_RECORD_TIME) {
                    clearInterval(silenceTimer);
                    stopRecording();
                }
            }
        }
    }, 100);
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
    }
    isListening = false;
    document.getElementById('rippleContainer').classList.remove('listening');
    if (silenceTimer) {
        clearInterval(silenceTimer);
        silenceTimer = null;
    }
}

function startListening() {
    if (isListening || isMuted || !isInCall || isAiSpeaking) return;
    if (mediaStream) {
        startRecording();
    }
}

function pauseListening() {
    stopRecording();
}

function resumeListening() {
    if (!isInCall || isMuted || isAiSpeaking) return;
    // 延迟一点再开始，避免录到 TTS 尾音
    setTimeout(() => startListening(), 800);
}

// =====================================================================
//  控制按钮
// =====================================================================
function toggleCall() {
    if (!isInCall) {
        // 开始通话
        isInCall = true;
        
        // 样式切换：iOS接通时，接听键变为红色的挂断键
        document.getElementById('btnCall').classList.add('active');
        document.getElementById('hint').textContent = '连接中...';

        // 切换显示状态和时间显示
        document.getElementById('callStatus').style.display = 'none';
        document.getElementById('callTimer').style.display = 'block';

        // 始终显示文字输入框
        document.getElementById('textInputArea').style.display = 'block';

        // 尝试初始化语音识别（失败也不阻塞）
        let hasVoice = false;
        if (!mediaStream) {
            hasVoice = initRecognition();
        } else {
            hasVoice = true;
            startListening();
        }
        if (!hasVoice) {
            document.getElementById('hint').textContent = '麦克风不可用，请打字输入';
        }

        // 开始计时
        callStartTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer(); // 立即执行一次，避免延迟一秒

        connect();
    } else {
        // 结束通话
        isInCall = false;
        
        // 保存通话记录
        if (useSSE) {
            fetch('/api/voice/end', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ session_id: sessionId })
            }).then(r => r.json()).then(result => {
                if (result.status === 'saved') {
                    console.log('通话记录已保存:', result.file);
                }
            }).catch(e => console.warn('保存通话记录失败:', e));
        }

        // 样式切换：变回绿色接听状态
        document.getElementById('btnCall').classList.remove('active');
        document.getElementById('hint').textContent = '通话已结束';
        
        document.getElementById('callStatus').style.display = 'block';
        document.getElementById('callTimer').style.display = 'none';
        document.getElementById('textInputArea').style.display = 'none';

        clearInterval(timerInterval);
        pauseListening();
        disconnect();
        audioQueue = [];
        isPlaying = false;
        isAiSpeaking = false;
        updateStatus('disconnected', '未连接');
        
        // 重置 session（下次通话用新 session）
        sessionId = 'vc_' + Date.now();
        
        // 回到最近通话页面
        setTimeout(() => switchView('recents'), 1500);
    }
}

function sendTextInput() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !isInCall) return;

    input.value = '';
    document.getElementById('userSubtitle').textContent = '你: ' + text;
    document.getElementById('statusLine').textContent = '发送中...';
    document.getElementById('statsLine').textContent = '';
    currentAiText = "";
    document.getElementById('aiSubtitle').textContent = "";
    sendText(text);
}

function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('btnMute');
    btn.classList.toggle('active', isMuted);

    if (isMuted) {
        pauseListening();
        document.getElementById('hint').textContent = '已静音';
    } else if (isInCall) {
        startListening();
    }
}

function toggleSpeaker() {
    const btn = document.getElementById('btnSpeaker');
    btn.classList.toggle('active');
    // 视觉反馈，实际扬声器由系统控制
}

// =====================================================================
//  UI 辅助
// =====================================================================
function updateStatus(state, text) {
    const dot = document.getElementById('connDot');
    dot.className = 'conn-dot ' + state;
    document.getElementById('callStatus').innerHTML = '';
    document.getElementById('callStatus').appendChild(dot);
    document.getElementById('callStatus').append(' ' + text);
}

function updateTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    document.getElementById('callTimer').textContent =
        `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}
</script>
