name: Build Twilio Voice AI

on:
  push:
    paths:
      - 'twilio-voice-ai/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./twilio-voice-ai
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/twilio-voice-ai:latest
