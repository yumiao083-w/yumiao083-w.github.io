<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuanlang's World</title>
    <style>
        /* --- 全局重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #030406; /* 从纯黑改为极深的冷蓝灰，提升高级感 */
            color: #fff;
            font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 噪点质感层：增加电影胶片感 --- */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- 开场动画遮罩 --- */
        .intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #030406;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 24px;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .intro-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .typewriter {
            font-size: clamp(1rem, 4.2vw, 1.6rem);
            letter-spacing: clamp(2px, 1vw, 5px);
            color: rgba(255,255,255,0.85);
            font-weight: 300;
            position: relative;
            display: inline;
            line-height: 2.2;
            text-align: center;
            max-width: 90vw;
            word-break: keep-all;
            text-shadow: 0 0 20px rgba(255,255,255,0.15); /* 增加微弱光晕 */
        }

        .typewriter .cursor {
            display: inline-block;
            width: 1px; /* 游标改细，更锐利 */
            height: 1.1em;
            background: rgba(255,255,255,0.8);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .typewriter .cursor.hidden {
            visibility: hidden;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* --- 星空画布 --- */
        #star-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- 暗角蒙版与微弱星云 --- */
        .vignette {
            position: absolute;
            inset: 0;
            /* 叠加了暗角和极弱的中心幽蓝冷光 */
            background: radial-gradient(circle at 50% 40%, rgba(20, 30, 45, 0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at center, transparent 30%, rgba(2,3,5,0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- 主内容 --- */
        .main-content {
            opacity: 0;
            transition: opacity 1.2s ease 0.4s;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main-content.show {
            opacity: 1;
        }

        /* --- 滚动导航容器 --- */
        .scroll-nav-container {
            height: 75vh;
            width: 100%;
            max-width: 600px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
            /* 加大上下渐变遮罩范围，让滑动消失更平滑 */
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        .scroll-nav-container::-webkit-scrollbar {
            display: none;
        }

        /* --- 导航列表 --- */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 120px 0;
            text-align: center;
            counter-reset: nav-index; /* 用于纯CSS生成编号 */
        }

        /* --- 细节更丰富的图案分隔符 --- */
        .nav-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 0 auto;
            position: relative;
        }
        .nav-divider::after {
            content: '♦';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            color: rgba(255,255,255,0.1);
        }

        /* --- 导航链接 --- */
        .nav-link {
            text-decoration: none;
            color: #7a7e85; /* 默认颜色稍微偏冷灰 */
            font-size: clamp(1.1rem, 3.5vw, 1.35rem);
            font-weight: 300;
            letter-spacing: clamp(2px, 0.8vw, 4px);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            padding: 8px 20px;
            display: inline-block;
            opacity: 0;
            text-shadow: 0 0 1px rgba(0,0,0,0.5); /* 增加文字实心感 */
        }

        /* 纯CSS生成档案感编号 */
        .nav-link:not(.coming-soon)::before {
            counter-increment: nav-index;
            content: "NO." counter(nav-index, decimal-leading-zero);
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.55rem;
            color: #333940;
            font-family: "Courier New", Courier, monospace;
            letter-spacing: 1px;
            transition: color 0.5s ease;
            opacity: 0; /* 悬浮时显现，或一直微弱显示 */
        }

        .main-content.show .nav-link {
            animation: fadeInUp 1s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
        }

        /* 增加更多项的延迟支持 */
        .main-content.show .nav-link:nth-child(1)  { animation-delay: 0.1s; }
        .main-content.show .nav-link:nth-child(2)  { animation-delay: 0.2s; }
        .main-content.show .nav-link:nth-child(3)  { animation-delay: 0.3s; }
        .main-content.show .nav-link:nth-child(4)  { animation-delay: 0.4s; }
        .main-content.show .nav-link:nth-child(5)  { animation-delay: 0.5s; }
        .main-content.show .nav-link:nth-child(6)  { animation-delay: 0.6s; }
        .main-content.show .nav-link:nth-child(7)  { animation-delay: 0.7s; }
        .main-content.show .nav-link:nth-child(8)  { animation-delay: 0.8s; }
        .main-content.show .nav-link:nth-child(9)  { animation-delay: 0.9s; }
        .main-content.show .nav-link:nth-child(10) { animation-delay: 1.0s; }
        .main-content.show .nav-link:nth-child(11) { animation-delay: 1.1s; }
        .main-content.show .nav-link:nth-child(12) { animation-delay: 1.2s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(2px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: rgba(255,255,255,0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        /* Hover效果优化：微弱位移和冷光 */
        .nav-link:hover {
            color: #f0f4f8;
            transform: scale(1.02) translateX(4px);
            text-shadow: 0 0 15px rgba(200, 220, 255, 0.4);
        }

        .nav-link:hover::after {
            width: 60%;
            left: 20%;
        }

        .nav-link:hover:not(.coming-soon)::before {
            color: #5a6470;
            opacity: 1;
        }

        .nav-link.coming-soon {
            color: #2a2e33;
            font-style: italic;
            cursor: default;
            letter-spacing: 6px;
        }

        .nav-link.coming-soon:hover {
            color: #3a4047;
            transform: none;
            text-shadow: none;
        }

        .nav-link.coming-soon::after {
            display: none;
        }

        /* --- 底部区域 --- */
        .footer {
            position: absolute;
            bottom: 30px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 1.5s ease 1.2s;
        }

        .footer.show {
            opacity: 1;
        }

        .footer-text {
            color: #444a52;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }

        .footer-signature {
            color: #2a2e33;
            font-size: 0.65rem;
            letter-spacing: 4px;
            font-style: italic;
            font-family: "Courier New", Courier, monospace;
        }
    </style>
</head>
<body>

    <div class="intro-overlay" id="introOverlay">
        <div class="typewriter" id="typewriter"><span class="cursor" id="cursor"></span></div>
    </div>

    <canvas id="star-canvas"></canvas>
    <div class="vignette"></div>

    <div class="main-content" id="mainContent">
        <div class="scroll-nav-container">
            <div class="nav-list">
                <a href="/call/" class="nav-link">给他打一通电话</a>

                <div class="nav-divider"></div>

                <a href="http://yuanlang.love/bag/" target="_blank" class="nav-link">翻翻他的包</a>
                <a href="http://yuanlang.love/pda/" target="_blank" class="nav-link">查看他的身份</a>

                <div class="nav-divider"></div>

                <a href="pages/letters.html" class="nav-link">他的"家书"</a>
                <a href="pages/obituary.html" class="nav-link">他为自己写下的讣告</a>
                <a href="pages/apology.html" class="nav-link">他的检讨书</a>
                <a href="pages/worldline.html" class="nav-link">请选择与他不同的世界线</a>

                <div class="nav-divider"></div>

                <a href="pages/anatomy.html" class="nav-link">解剖一个袁朗</a>
                <a href="pages/love.html" class="nav-link">写他的爱</a>
                <a href="pages/ending.html" class="nav-link">没有结局的故事</a>

                <div class="nav-divider"></div>

            </div>
        </div>

    <div class="footer" id="footer">
        <span class="footer-text">延绵他的灵魂，拓展他的天地。</span>
        <span class="footer-signature">— Yolan</span>
    </div>

    <script>
        /* ========== 打字机开场 ========== */
        (function () {
            const text = '延绵他的灵魂，拓展他的天地。';
            const el = document.getElementById('typewriter');
            const cursorEl = document.getElementById('cursor');
            const overlay = document.getElementById('introOverlay');
            const main = document.getElementById('mainContent');
            const footer = document.getElementById('footer');
            let i = 0;

            function type() {
                if (i < text.length) {
                    const span = document.createElement('span');
                    span.textContent = text[i];
                    el.insertBefore(span, cursorEl);
                    i++;

                    const ch = text[i - 1];
                    const delay = (ch === '，' || ch === '。') ? 400 : 140;
                    setTimeout(type, delay);
                } else {
                    setTimeout(() => {
                        cursorEl.classList.add('hidden');
                        setTimeout(() => {
                            overlay.classList.add('fade-out');
                            main.classList.add('show');
                            footer.classList.add('show');
                            overlay.addEventListener('transitionend', () => {
                                overlay.remove();
                            });
                        }, 800);
                    }, 1200);
                }
            }

            setTimeout(type, 600);
        })();

        /* ========== 星空背景升级版 ========== */
        (function () {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, stars = [];
            const DENSITY = 5000;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initStars();
            }

            class Star {
                constructor() { this.reset(true); }
                reset(initial) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    // 使用幂次分布，让小星星占据绝大多数，大星星极少，增加真实感
                    this.size = Math.random() * Math.random() * 1.8 + 0.1;
                    this.opacity = initial ? Math.random() : 0;
                    // 大星星闪烁慢，小星星闪烁快
                    this.speed = (Math.random() * 0.01 + 0.005) * (1 / (this.size + 0.1));
                    this.direction = 1;
                    // 增加极其缓慢的上升动效，产生深空失重感
                    this.vy = -(Math.random() * 0.03 + 0.005);
                }
                update() {
                    // 透明度呼吸
                    this.opacity += this.speed * this.direction;
                    if (this.opacity >= 1) { this.opacity = 1; this.direction = -1; }
                    else if (this.opacity <= 0) { this.reset(false); }

                    // 位置移动
                    this.y += this.vy;
                    if (this.y < 0) {
                        this.y = height;
                        this.x = Math.random() * width;
                    }
                }
                draw() {
                    ctx.globalAlpha = this.opacity;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    // 较大的星星带有一点极冷淡的蓝白色光晕
                    ctx.fillStyle = this.size > 1.2 ? '#e8f0fe' : '#ffffff';
                    if (this.size > 1.5) {
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = '#aaccff';
                    } else {
                        ctx.shadowBlur = 0;
                    }
                    ctx.fill();
                }
            }

            function initStars() {
                const count = Math.floor((width * height) / DENSITY);
                stars = Array.from({ length: count }, () => new Star());
            }

            function animate() {
                // 每次不清空为透明，而是覆盖一层极低透明度的黑色，留下极微弱的拖尾
                ctx.fillStyle = 'rgba(3, 4, 6, 0.4)'; 
                ctx.fillRect(0, 0, width, height);
                
                stars.forEach(s => { s.update(); s.draw(); });
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();
        })();
    </script>
