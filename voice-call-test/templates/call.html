<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>语音通话</title>
    <style>
        /* CSS变量 */
        :root {
            --bg-color: #000;
            --text-primary: #fff;
            --text-secondary: #8e8e93;
            --btn-bg: rgba(255,255,255,0.15);
            --btn-bg-active: #fff;
            --btn-icon-active: #000;
            --system-green: #34c759;
            --system-red: #ff3b30;
            --system-blue: #0a84ff;
        }

        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景光效 */
        .bg-blur {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(40,40,50,0.6), transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* 视图切换 */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        .view.active { display: flex; }

        /* === 拨号视图 === */
        .dial-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .dial-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a3a3c, #636366);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--text-primary);
            font-weight: 300;
        }
        .dial-name {
            font-size: 28px;
            font-weight: 500;
            margin-top: 8px;
        }
        #hint {
            font-size: 15px;
            color: var(--text-secondary);
        }
        .dial-actions {
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 20px));
        }
        .btn-call-start {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: none;
            background: var(--system-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn-call-start:active {
            transform: scale(0.92);
            opacity: 0.85;
        }
        .btn-call-start svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        /* === 通话中视图 === */
        /* 顶部栏 */
        .call-topbar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
        }
        .btn-back {
            background: none;
            border: none;
            color: var(--system-blue);
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back svg {
            width: 24px;
            height: 24px;
            fill: var(--system-blue);
        }
        .call-topbar-right {
            margin-left: auto;
        }
        .btn-settings {
            background: none;
            border: none;
            color: var(--system-blue);
            font-size: 22px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: 4px 8px;
        }

        /* 设置弹窗 */
        .settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }
        .settings-overlay.active {
            display: flex;
        }
        .settings-panel {
            background: #1c1c1e;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 20px));
            -webkit-overflow-scrolling: touch;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .settings-title {
            font-size: 20px;
            font-weight: 600;
        }
        .btn-settings-close {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-section {
            margin-bottom: 16px;
        }
        .settings-section-title {
            font-size: 15px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .settings-field {
            margin-bottom: 10px;
        }
        .settings-field label {
            font-size: 13px;
            color: #8e8e93;
            display: block;
            margin-bottom: 4px;
        }
        .settings-field input, .settings-field select, .settings-field textarea {
            width: 100%;
            background: #2c2c2e;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 10px 12px;
            font-family: inherit;
            outline: none;
            -webkit-appearance: none;
        }
        .settings-field textarea {
            resize: vertical;
            min-height: 60px;
        }
        .settings-field select option {
            background: #2c2c2e;
            color: #fff;
        }
        .btn-settings-save {
            width: 100%;
            background: var(--system-blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .settings-hint {
            font-size: 12px;
            color: #636366;
            margin-top: 4px;
        }

        /* 头像区 */
        .call-avatar-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 4px;
            position: relative;
            width: 100%;
        }
        .call-avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a3a3c, #636366);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 300;
            position: relative;
            z-index: 2;
        }
        #rippleContainer {
            position: absolute;
            inset: -30px;
            z-index: 1;
        }
        .ripple {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            opacity: 0;
        }

        /* 波纹动画 */
        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        .listening .ripple {
            animation: ripple 2.4s ease-out infinite;
        }
        .listening .ripple:nth-child(1) { animation-delay: 0s; }
        .listening .ripple:nth-child(2) { animation-delay: 0.6s; }
        .listening .ripple:nth-child(3) { animation-delay: 1.2s; }

        /* 名字 */
        .call-name {
            font-size: 34px;
            font-weight: 600;
            margin-top: 16px;
            text-align: center;
            width: 100%;
        }

        /* 状态/计时器 */
        .call-status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 6px;
        }
        #connDot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--system-green);
            display: none;
        }
        #callStatus {
            font-size: 15px;
            color: var(--text-secondary);
        }
        #callTimer {
            font-size: 15px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            display: none;
        }

        /* 字幕区 */
        .subtitle-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .subtitle-area::-webkit-scrollbar { display: none; }
        #userSubtitle {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.5;
            min-height: 0;
            text-align: center;
            width: 100%;
        }
        #aiSubtitle {
            font-size: 22px;
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 0;
            text-align: center;
            width: 100%;
        }
        #statusLine {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }
        #statsLine {
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
            text-align: center;
        }

        /* 文字输入区 */
        #textInputArea {
            display: none;
            padding: 8px 16px;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        #textInput {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            font-size: 16px;
            padding: 0 16px;
            outline: none;
            font-family: inherit;
        }
        #textInput::placeholder {
            color: var(--text-secondary);
        }
        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--system-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-send svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* 底部控制栏 */
        .call-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 16px 0;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 20px));
        }
        .ctrl-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: var(--btn-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.15s;
            position: relative;
        }
        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn svg {
            width: 32px;
            height: 32px;
            fill: var(--text-primary);
            transition: fill 0.2s;
        }
        .ctrl-btn.active {
            background: var(--btn-bg-active);
        }
        .ctrl-btn.active svg {
            fill: var(--btn-icon-active);
        }

        /* 静音按钮图标切换 */
        #btnMute .icon-mic-off { display: none; }
        #btnMute.active .icon-mic { display: none; }
        #btnMute.active .icon-mic-off { display: block; }

        /* 挂断按钮 */
        .ctrl-btn-hangup {
            width: 76px;
            height: 76px;
            background: var(--system-red);
        }
        .ctrl-btn-hangup svg {
            fill: #fff;
            transition: transform 0.2s;
        }
        .ctrl-btn-hangup.active svg {
            transform: rotate(135deg);
            fill: #fff;
        }

        /* 小屏适配 */
        @media (max-height: 700px) {
            .dial-avatar {
                width: 90px;
                height: 90px;
                font-size: 36px;
            }
            .dial-name { font-size: 24px; }
            .btn-call-start {
                width: 64px;
                height: 64px;
            }
            .btn-call-start svg {
                width: 30px;
                height: 30px;
            }
            .call-avatar-wrapper {
                width: 80px;
                height: 80px;
            }
            .call-avatar {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            #rippleContainer { inset: -20px; }
            .call-name { font-size: 28px; }
            .ctrl-btn {
                width: 60px;
                height: 60px;
            }
            .ctrl-btn svg {
                width: 26px;
                height: 26px;
            }
            .ctrl-btn-hangup {
                width: 64px;
                height: 64px;
            }
            .call-controls { gap: 28px; }
            #aiSubtitle { font-size: 19px; }
            #userSubtitle { font-size: 16px; }
        }

        /* safe-area padding */
        @supports (padding: env(safe-area-inset-top)) {
            .call-topbar {
                padding-top: calc(12px + env(safe-area-inset-top));
            }
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>

    <!-- 拨号视图 -->
    <div id="viewDial" class="view active">
        <div class="dial-content">
            <div class="dial-name">袁朗</div>
            <div id="hint">点击拨号开始语音通话</div>
        </div>
        <div class="dial-actions" style="display:flex;justify-content:center;">
            <button class="btn-call-start" id="btnCall" onclick="startCall()">
                <svg viewBox="0 0 24 24">
                    <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 通话中视图 -->
    <div id="viewCall" class="view">
        <!-- 顶部栏 -->
        <div class="call-topbar">
            <button class="btn-back" id="btnBack" onclick="if(isInCall){toggleCall()}else{switchView('dial')}">
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                </svg>
                返回
            </button>
            <div class="call-topbar-right">
                <button class="btn-settings" onclick="openSettings()">⚙️</button>
            </div>
        </div>

        <!-- 头像区（波纹动画） -->
        <div class="call-avatar-area">
            <div class="call-avatar-wrapper" id="rippleContainer">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
            </div>
        </div>

        <!-- 名字 -->
        <div class="call-name">袁朗</div>

        <!-- 状态/计时器 -->
        <div class="call-status-area">
            <div id="connDot"></div>
            <span id="callStatus">正在连接…</span>
            <span id="callTimer">00:00</span>
        </div>

        <!-- 字幕区 -->
        <div class="subtitle-area">
            <div id="userSubtitle"></div>
            <div id="aiSubtitle"></div>
            <div id="statusLine"></div>
            <div id="statsLine"></div>
        </div>

        <!-- 文字输入区 -->
        <div id="textInputArea">
            <input type="text" id="textInput" placeholder="输入文字消息…" autocomplete="off" />
            <button class="btn-send" onclick="sendTextInput()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>

        <!-- 底部控制栏 -->
        <div class="call-controls">
            <!-- 静音按钮 -->
            <button class="ctrl-btn" id="btnMute" onclick="toggleMute()">
                <svg class="icon-mic" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <svg class="icon-mic-off" viewBox="0 0 24 24">
                    <path d="M19 11c0 .73-.13 1.43-.37 2.09l1.53 1.53C20.69 13.51 21 12.29 21 11h-2zM4.27 3L3 4.27l6 6V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c1.37-.2 2.63-.82 3.65-1.68l2.08 2.08 1.27-1.27L4.27 3zM12 4c-1.66 0-3 1.34-3 3v.18l7 7V7c0-1.66-1.34-3-3-3z"/>
                </svg>
            </button>

            <!-- 免提按钮 -->
            <button class="ctrl-btn" id="btnSpeaker" onclick="toggleSpeaker()">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </button>

            <!-- 挂断按钮 -->
            <button class="ctrl-btn ctrl-btn-hangup" id="btnHangup" onclick="toggleCall()">
                <svg viewBox="0 0 24 24">
                    <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>// === 初始化 ===
const TOKEN = new URLSearchParams(window.location.search).get('token') || '';
if (!TOKEN) { window.location.href = '/'; }
const sessionId = 'vc_' + Date.now();

// 从 URL 参数读取设置（HF Spaces iframe 中 localStorage 被阻止）
const _params = new URLSearchParams(window.location.search);
const userInfo = _params.get('user_info') || '';
const topic = _params.get('topic') || '';
const extraPrompt = _params.get('extra_prompt') || '';
let customLlm = null;
try { const _cl = _params.get('custom_llm'); if (_cl) customLlm = JSON.parse(_cl); } catch(e) {}
let customTts = null;
try { const _ct = _params.get('custom_tts'); if (_ct) customTts = JSON.parse(_ct); } catch(e) {}
const selectedModel = _params.get('model') || '';

// 构建 custom_prompt
let customPrompt = '';
if (userInfo) customPrompt += '# 关于用户\n' + userInfo + '\n\n';
if (topic) customPrompt += '# 本次话题\n' + topic + '\n\n';
if (extraPrompt) customPrompt += '# 补充设定\n' + extraPrompt + '\n\n';

// === 状态变量 ===
let isInCall = false;
let isMuted = false;
let isAiSpeaking = false;
let isPlaying = false;
let isListening = false;
let audioQueue = [];
let currentAiText = '';
let callStartTime = null;
let timerInterval = null;
let mediaRecorder = null;
let audioChunks = [];
let mediaStream = null;
let audioContext = null;
let analyser = null;
let silenceTimer = null;
let silenceStart = null;
let hasVoiceActivity = false;
let voiceFrameCount = 0;
let recordStartTime = 0;
const SILENCE_THRESHOLD = 15;
const SILENCE_DURATION = 1500;
const MIN_RECORD_TIME = 500;

// === 视图切换 ===
function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// === cleanVoiceTags ===
function cleanVoiceTags(text) {
    // 过滤所有括号内的英文语气词标签，如 (laughs) (hmm) (uh) (oh) 等
    let c = text.replace(/\([a-zA-Z\s\-]+\)/g, '');
    // 过滤停顿标签 <#0.5#>
    c = c.replace(/<#[\d.]+#>/g, '');
    return c.replace(/\s{2,}/g, ' ').trim();
}

// === SSE 发送 ===
function sendText(text) {
    const body = { text, session_id: sessionId, token: TOKEN };
    if (customPrompt) body.custom_prompt = customPrompt;
    if (selectedModel) body.model = selectedModel;
    if (customLlm && customLlm.base_url && customLlm.api_key) body.custom_api = customLlm;
    if (customTts && customTts.api_key) body.custom_tts = customTts;

    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(resp => {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        function pump() {
            reader.read().then(({ done, value }) => {
                if (done) return;
                buf += decoder.decode(value, { stream: true });
                const lines = buf.split('\n');
                buf = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') return;
                        try { handleMessage(JSON.parse(data)); } catch(e) {}
                    }
                }
                pump();
            });
        }
        pump();
    }).catch(err => console.error('SSE error:', err));
}

// === 消息处理 ===
function handleMessage(msg) {
    switch (msg.type) {
        case 'user_confirmed':
            document.getElementById('userSubtitle').textContent = '你: ' + msg.text;
            document.getElementById('statusLine').textContent = '已收到，正在处理...';
            isAiSpeaking = true;
            pauseListening();
            break;
        case 'status':
            document.getElementById('statusLine').textContent = msg.message || '';
            break;
        case 'text_delta':
            currentAiText += msg.text;
            document.getElementById('aiSubtitle').textContent = cleanVoiceTags(currentAiText);
            break;
        case 'audio':
            audioQueue.push({ audio: msg.audio, text: msg.text, index: msg.index });
            playNext();
            break;
        case 'done':
            document.getElementById('statusLine').textContent = '';
            if (msg.stats) {
                let s = msg.stats;
                let info = '总耗时 ' + s.total_time + 's';
                if (s.first_token_time) info += ' | 首token ' + s.first_token_time + 's';
                info += ' | LLM ' + s.llm_time + 's | ' + s.sentences + '句TTS';
                document.getElementById('statsLine').textContent = info;
            }
            if (!isPlaying && audioQueue.length === 0) { isAiSpeaking = false; resumeListening(); }
            break;
        case 'tts_error':
            document.getElementById('statusLine').textContent = '⚠️ 语音合成失败: ' + msg.text;
            break;
        case 'error':
            document.getElementById('aiSubtitle').textContent = '⚠️ ' + msg.message;
            document.getElementById('statusLine').textContent = '';
            isAiSpeaking = false;
            resumeListening();
            break;
    }
}

// === 音频播放队列 ===
function playNext() {
    if (isPlaying || audioQueue.length === 0) return;
    isPlaying = true;
    const item = audioQueue.shift();
    const bytes = Uint8Array.from(atob(item.audio), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.volume = 1.0;
    pauseListening();
    audio.onended = audio.onerror = () => {
        URL.revokeObjectURL(url);
        isPlaying = false;
        if (audioQueue.length > 0) { playNext(); }
        else { isAiSpeaking = false; resumeListening(); }
    };
    audio.play().catch(() => { isPlaying = false; playNext(); });
}

// === 录音 + VAD ===
function initRecognition() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        document.getElementById('hint').textContent = '⚠️ 浏览器不支持录音';
        return false;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        document.getElementById('hint').textContent = '🎤 麦克风就绪';
        startRecording();
    }).catch(() => {
        document.getElementById('hint').textContent = '⚠️ 麦克风权限被拒绝，请打字输入';
    });
    return true;
}

function startRecording() {
    if (!mediaStream || !isInCall || isMuted || isAiSpeaking) return;
    audioChunks = [];
    recordStartTime = Date.now();
    hasVoiceActivity = false;
    voiceFrameCount = 0;
    let mimeType = 'audio/webm;codecs=opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/webm';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/mp4';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
    try {
        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : {});
    } catch(e) { return; }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const dur = Date.now() - recordStartTime;
        if (dur < MIN_RECORD_TIME || audioChunks.length === 0 || !hasVoiceActivity) {
            audioChunks = [];
            if (isInCall && !isMuted && !isPlaying && !isAiSpeaking) setTimeout(startRecording, 200);
            return;
        }
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        audioChunks = [];
        if (blob.size < 1000) { if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 200); return; }
        document.getElementById('userSubtitle').textContent = '🎤 识别中...';
        document.getElementById('statusLine').textContent = '语音识别中...';
        const fd = new FormData();
        fd.append('audio', blob, 'recording.webm');
        fetch('/api/recognize', { method: 'POST', body: fd }).then(r => r.json()).then(result => {
            if (result.error) { document.getElementById('statusLine').textContent = '⚠️ ' + result.error; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 500); return; }
            const text = (result.text || '').trim();
            if (!text) { document.getElementById('userSubtitle').textContent = ''; document.getElementById('statusLine').textContent = ''; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 200); return; }
            document.getElementById('userSubtitle').textContent = '你: ' + text;
            document.getElementById('statusLine').textContent = '识别耗时 ' + (result.time||'?') + 's | 发送中...';
            document.getElementById('statsLine').textContent = '';
            currentAiText = '';
            document.getElementById('aiSubtitle').textContent = '';
            sendText(text);
        }).catch(() => { document.getElementById('statusLine').textContent = '⚠️ 网络错误'; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 1000); });
    };
    mediaRecorder.start(100);
    isListening = true;
    document.getElementById('rippleContainer').classList.add('listening');
    document.getElementById('hint').textContent = '正在聆听...';
    silenceStart = null;
    startSilenceDetection();
}

function startSilenceDetection() {
    if (silenceTimer) clearInterval(silenceTimer);
    silenceTimer = setInterval(() => {
        if (!analyser || !mediaRecorder || mediaRecorder.state !== 'recording') { clearInterval(silenceTimer); return; }
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const vol = data.reduce((a, b) => a + b, 0) / data.length;
        if (vol > SILENCE_THRESHOLD) { silenceStart = null; voiceFrameCount++; if (voiceFrameCount >= 3) hasVoiceActivity = true; }
        else { if (!silenceStart) silenceStart = Date.now(); else if (Date.now() - silenceStart > SILENCE_DURATION && Date.now() - recordStartTime > MIN_RECORD_TIME) { clearInterval(silenceTimer); stopRecording(); } }
    }, 100);
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    isListening = false;
    document.getElementById('rippleContainer').classList.remove('listening');
    if (silenceTimer) { clearInterval(silenceTimer); silenceTimer = null; }
}
function startListening() { if (isListening || isMuted || !isInCall || isAiSpeaking) return; if (mediaStream) startRecording(); }
function pauseListening() { stopRecording(); }
function resumeListening() { if (!isInCall || isMuted || isAiSpeaking) return; setTimeout(startListening, 800); }

// === 控制按钮 ===
function startCall() {
    switchView('call');
    if (!isInCall) toggleCall();
}

function toggleCall() {
    if (!isInCall) {
        isInCall = true;
        document.getElementById('btnCall').classList.add('active');
        document.getElementById('hint').textContent = '连接中...';
        document.getElementById('callStatus').style.display = 'none';
        document.getElementById('callTimer').style.display = 'block';
        document.getElementById('textInputArea').style.display = 'flex';
        callStartTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
        if (!mediaStream) { initRecognition(); } else { startListening(); }
        updateStatus('connected', '已连接');
    } else {
        isInCall = false;
        document.getElementById('btnCall').classList.remove('active');
        document.getElementById('hint').textContent = '通话已结束';
        document.getElementById('callStatus').style.display = 'block';
        document.getElementById('callTimer').style.display = 'none';
        document.getElementById('textInputArea').style.display = 'none';
        clearInterval(timerInterval);
        pauseListening();
        audioQueue = [];
        isPlaying = false;
        isAiSpeaking = false;
        updateStatus('disconnected', '未连接');
    }
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('btnMute').classList.toggle('active', isMuted);
    if (isMuted) { pauseListening(); document.getElementById('hint').textContent = '已静音'; }
    else if (isInCall) startListening();
}

function toggleSpeaker() { document.getElementById('btnSpeaker').classList.toggle('active'); }

function sendTextInput() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !isInCall) return;
    input.value = '';
    document.getElementById('userSubtitle').textContent = '你: ' + text;
    document.getElementById('statusLine').textContent = '发送中...';
    document.getElementById('statsLine').textContent = '';
    currentAiText = '';
    document.getElementById('aiSubtitle').textContent = '';
    sendText(text);
}

// === UI辅助 ===
function updateStatus(state, text) {
    const dot = document.getElementById('connDot');
    dot.className = 'conn-dot ' + state;
    const el = document.getElementById('callStatus');
    el.innerHTML = '';
    el.appendChild(dot);
    el.append(' ' + text);
}

function updateTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('callTimer').textContent = m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
}

// textInput回车发送
document.getElementById('textInput').addEventListener('keydown', e => { if (e.key === 'Enter') { sendTextInput(); e.preventDefault(); } });

// === 设置弹窗 ===
function openSettings() {
    // 填充当前值
    document.getElementById('settingsUserInfo').value = _params.get('user_info') || '';
    document.getElementById('settingsTopic').value = _params.get('topic') || '';
    document.getElementById('settingsExtraPrompt').value = _params.get('extra_prompt') || '';

    // LLM
    if (customLlm) {
        document.getElementById('settingsLlmUrl').value = customLlm.base_url || '';
        document.getElementById('settingsLlmKey').value = customLlm.api_key || '';
        document.getElementById('settingsLlmModel').value = customLlm.model || '';
    }

    // TTS
    if (customTts) {
        document.getElementById('settingsTtsKey').value = customTts.api_key || '';
        document.getElementById('settingsTtsGroupId').value = customTts.group_id || '';
        document.getElementById('settingsTtsVoiceId').value = customTts.voice_id || '';
        if (customTts.model) document.getElementById('settingsTtsModel').value = customTts.model;
    }

    document.getElementById('settingsOverlay').classList.add('active');
}

function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
}

function saveSettings() {
    // 更新运行时变量
    var uInfo = document.getElementById('settingsUserInfo').value;
    var tp = document.getElementById('settingsTopic').value;
    var ep = document.getElementById('settingsExtraPrompt').value;

    // 重建 customPrompt
    customPrompt = '';
    if (uInfo) customPrompt += '# 关于用户\n' + uInfo + '\n\n';
    if (tp) customPrompt += '# 本次话题\n' + tp + '\n\n';
    if (ep) customPrompt += '# 补充设定\n' + ep + '\n\n';

    // LLM
    var llmUrl = document.getElementById('settingsLlmUrl').value.trim();
    var llmKey = document.getElementById('settingsLlmKey').value.trim();
    var llmModel = document.getElementById('settingsLlmModel').value.trim();
    if (llmUrl && llmKey) {
        customLlm = { base_url: llmUrl, api_key: llmKey, model: llmModel };
    } else {
        customLlm = null;
    }

    // TTS
    var ttsKey = document.getElementById('settingsTtsKey').value.trim();
    var ttsGroupId = document.getElementById('settingsTtsGroupId').value.trim();
    var ttsVoiceId = document.getElementById('settingsTtsVoiceId').value.trim();
    var ttsModel = document.getElementById('settingsTtsModel').value;
    if (ttsKey) {
        customTts = { api_key: ttsKey };
        if (ttsGroupId) customTts.group_id = ttsGroupId;
        if (ttsVoiceId) customTts.voice_id = ttsVoiceId;
        if (ttsModel) customTts.model = ttsModel;
    } else {
        customTts = null;
    }

    closeSettings();
}
</script>

<!-- 设置弹窗 -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-panel">
        <div class="settings-header">
            <div class="settings-title">通话设置</div>
            <button class="btn-settings-close" onclick="closeSettings()">✕</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">个人信息</div>
            <div class="settings-field">
                <textarea id="settingsUserInfo" rows="3" placeholder="你的名字、性格、喜好..."></textarea>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">话题</div>
            <div class="settings-field">
                <input type="text" id="settingsTopic" placeholder="想聊什么话题">
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">补充设定</div>
            <div class="settings-field">
                <textarea id="settingsExtraPrompt" rows="4" placeholder="额外的角色设定、世界书..."></textarea>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">LLM 对话模型</div>
            <div class="settings-field">
                <label>API 地址</label>
                <input type="url" id="settingsLlmUrl" placeholder="https://api.example.com/v1">
            </div>
            <div class="settings-field">
                <label>API Key</label>
                <input type="password" id="settingsLlmKey" placeholder="sk-...">
            </div>
            <div class="settings-field">
                <label>模型</label>
                <input type="text" id="settingsLlmModel" placeholder="模型名称">
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">MiniMax 语音合成</div>
            <div class="settings-field">
                <label>API Key</label>
                <input type="password" id="settingsTtsKey" placeholder="MiniMax API Key">
            </div>
            <div class="settings-field">
                <label>Group ID</label>
                <input type="text" id="settingsTtsGroupId" placeholder="MiniMax Group ID">
            </div>
            <div class="settings-field">
                <label>Voice ID</label>
                <input type="text" id="settingsTtsVoiceId" placeholder="如 male-qn-qingse">
            </div>
            <div class="settings-field">
                <label>TTS 模型</label>
                <select id="settingsTtsModel">
                    <option value="speech-02-hd">speech-02-hd（高清）</option>
                    <option value="speech-02">speech-02（标准）</option>
                    <option value="speech-01-hd">speech-01-hd</option>
                    <option value="speech-01">speech-01</option>
                </select>
            </div>
        </div>

        <button class="btn-settings-save" onclick="saveSettings()">保存设置</button>
        <div class="settings-hint" style="text-align:center;margin-top:8px">设置立即生效，下一条消息将使用新配置</div>
    </div>
</div>
