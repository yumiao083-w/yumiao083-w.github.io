<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>语音通话</title>
    <style>
        /* === 主题系统 CSS变量 === */

        /* 默认主题：iOS 风格 */
        :root, [data-theme="ios"] {
            --bg-color: #000000;
            --bg-glass: rgba(255, 255, 255, 0.15);
            --bg-glass-active: #FFFFFF;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --icon-active: #000000;
            --system-green: #34C759;
            --system-red: #FF3B30;
            --system-blue: #0A84FF;
            --system-gray-bg: #1C1C1E;
            --system-input-bg: #2C2C2E;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            --border-radius-card: 12px;
            --border-radius-btn: 50%;
            --bg-blur-gradient: radial-gradient(circle at 50% 15%, #2a2a30 0%, #000000 65%);
            --dial-name-size: 36px;
            --ctrl-btn-size: 72px;
            --topbar-bg: transparent;
        }

        /* 千禧年主题骨架：诺基亚/早期手机风格 */
        [data-theme="y2k"] {
            --bg-color: #2b3a4a;
            --bg-glass: rgba(100, 180, 220, 0.25);
            --bg-glass-active: #7ec8e3;
            --text-primary: #e0f0e8;
            --text-secondary: #8ab8a0;
            --icon-active: #1a2a3a;
            --system-green: #4caf50;
            --system-red: #e53935;
            --system-blue: #42a5f5;
            --system-gray-bg: #1e2d3d;
            --system-input-bg: #263848;
            --font-main: "Courier New", "Nokia Sans", monospace;
            --border-radius-card: 4px;
            --border-radius-btn: 8px;
            --bg-blur-gradient: linear-gradient(180deg, #3a5a6a 0%, #1a2a3a 100%);
            --dial-name-size: 28px;
            --ctrl-btn-size: 64px;
            --topbar-bg: rgba(30, 45, 60, 0.9);
        }

        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #E5E5EA;
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 内部应用容器（适配多尺寸屏幕） */
        .app-container {
            background: var(--bg-color);
            color: var(--text-primary);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 背景微弱光效 */
        .bg-blur {
            position: absolute;
            inset: 0;
            background: var(--bg-blur-gradient);
            z-index: 0;
            pointer-events: none;
        }

        /* 视图切换 */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        .view.active { display: flex; }

        /* === 拨号视图 === */
        .dial-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 40px;
        }
        .dial-name {
            font-size: var(--dial-name-size);
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        #hint {
            font-size: 16px;
            color: var(--text-secondary);
        }
        .dial-actions {
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 20px));
            display: flex;
            justify-content: center;
        }
        .btn-call-start {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: none;
            background: var(--system-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn-call-start:active {
            transform: scale(0.9);
            opacity: 0.85;
        }
        .btn-call-start svg {
            width: 36px;
            height: 36px;
            fill: #fff;
        }

        /* === 通话中视图 === */
        /* 顶部栏 */
        .call-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: calc(16px + env(safe-area-inset-top, 0px));
            position: relative;
            z-index: 20;
        }
        .btn-back {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .btn-back:active { opacity: 0.5; }
        .btn-back svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .btn-settings {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .btn-settings:active { opacity: 0.5; }
        .btn-settings svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 名字与状态区 */
        .call-header-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        .call-name {
            font-size: 34px;
            font-weight: 400;
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .call-status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            height: 20px;
        }
        #connDot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--system-green);
            display: none;
        }
        #callStatus, #callTimer {
            font-size: 16px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            font-weight: 400;
        }
        #callTimer { display: none; }

        /* 通话中间弹性区域 */
        .call-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        /* 字幕区 */
        .subtitle-area {
            max-height: 35vh;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            margin: auto 0;
            /* 顶部淡出遮罩 */
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }
        .subtitle-area::-webkit-scrollbar { display: none; }
        
        #userSubtitle {
            font-size: 17px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            text-align: center;
            width: 100%;
            font-weight: 400;
        }
        #aiSubtitle {
            font-size: 22px;
            color: var(--text-primary);
            line-height: 1.4;
            text-align: center;
            width: 100%;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #statusLine {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: -4px;
        }
        #statsLine {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }

        /* 文字输入区 (类似 iMessage) */
        #textInputArea {
            display: none;
            padding: 12px 16px;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
        #textInput {
            flex: 1;
            height: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            font-size: 16px;
            padding: 0 16px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        #textInput:focus {
            border-color: rgba(255,255,255,0.3);
        }
        #textInput::placeholder {
            color: var(--text-secondary);
        }
        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--system-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s;
        }
        .btn-send:active { transform: scale(0.9); }
        .btn-send svg {
            width: 16px;
            height: 16px;
            fill: #fff;
            transform: translateX(-1px) translateY(1px); /* 微调飞机图标位置 */
        }

        /* 底部控制栏 */
        .call-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px 0;
            padding-bottom: calc(36px + env(safe-area-inset-bottom, 20px));
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .ctrl-btn {
            width: var(--ctrl-btn-size);
            height: var(--ctrl-btn-size);
            border-radius: var(--border-radius-btn);
            border: none;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
        .ctrl-btn svg {
            width: 30px;
            height: 30px;
            fill: var(--text-primary);
            transition: fill 0.2s;
        }
        .ctrl-btn.active {
            background: var(--bg-glass-active);
        }
        .ctrl-btn.active svg {
            fill: var(--icon-active);
        }

        /* 日志样式 */
        .log-content {
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 12px;
            background: #1C1C1E;
            border-radius: 10px;
            font-family: "SF Mono", Menlo, monospace;
            font-size: 11px;
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .log-content::-webkit-scrollbar { display: none; }
        .log-line { margin-bottom: 2px; }
        .log-time { color: #8E8E93; }
        .log-info { color: #34C759; }
        .log-warn { color: #FF9500; }
        .log-error { color: #FF3B30; }
        .log-debug { color: #0A84FF; }
        .log-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .log-actions button {
            flex: 1;
            background: #2C2C2E;
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }
        .log-actions button:active { opacity: 0.5; }

        /* 静音按钮图标切换 */
        #btnMute .icon-mic-off { display: none; }
        #btnMute.active .icon-mic { display: none; }
        #btnMute.active .icon-mic-off { display: block; }

        /* 挂断按钮 */
        .ctrl-btn-hangup {
            width: var(--ctrl-btn-size);
            height: var(--ctrl-btn-size);
            background: var(--system-red);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        .ctrl-btn-hangup:active {
            background: #D32F2F;
            transform: scale(0.9);
        }
        .ctrl-btn-hangup svg {
            fill: #fff;
            width: 34px;
            height: 34px;
            transition: transform 0.2s;
        }
        .ctrl-btn-hangup.active svg {
            transform: rotate(135deg);
        }

        /* 小屏适配 */
        @media (max-height: 700px) {
            .dial-name, .call-name { font-size: 28px; }
            .call-controls { gap: 24px; padding-bottom: 24px; }
            .ctrl-btn, .ctrl-btn-hangup { width: 64px; height: 64px; }
            .ctrl-btn svg, .ctrl-btn-hangup svg { width: 26px; height: 26px; }
            #aiSubtitle { font-size: 19px; }
            #userSubtitle { font-size: 16px; }
        }

        /* === 设置弹窗 (iOS Action Sheet 风格) === */
        .settings-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .settings-overlay.active {
            display: flex;
            opacity: 1;
        }
        .settings-panel {
            background: var(--system-gray-bg);
            border-radius: var(--border-radius-card) var(--border-radius-card) 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 20px));
            -webkit-overflow-scrolling: touch;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .settings-overlay.active .settings-panel {
            transform: translateY(0);
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .settings-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .btn-settings-close {
            background: #2C2C2E;
            border: none;
            color: #8E8E93;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-section {
            margin-bottom: 24px;
        }
        .settings-section-title {
            font-size: 13px;
            font-weight: 500;
            color: #8e8e93;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 8px;
            letter-spacing: 0.5px;
        }
        .settings-field {
            margin-bottom: 1px; /* 列表分割线用底色模拟 */
        }
        .settings-field:first-of-type input, .settings-field:first-of-type select, .settings-field:first-of-type textarea {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .settings-field:last-of-type input, .settings-field:last-of-type select, .settings-field:last-of-type textarea {
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        .settings-field label {
            font-size: 13px;
            color: #8e8e93;
            display: block;
            margin-bottom: 4px;
            padding-left: 8px;
        }
        .settings-field input, .settings-field select, .settings-field textarea {
            width: 100%;
            background: var(--system-input-bg);
            border: none;
            border-radius: 0; /* 由 first/last of type 控制圆角 */
            color: #fff;
            font-size: 16px;
            padding: 14px 16px;
            font-family: inherit;
            outline: none;
            -webkit-appearance: none;
        }
        .settings-field select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238E8E93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }
        .settings-field textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-settings-save {
            width: 100%;
            background: var(--system-blue);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-settings-save:active { opacity: 0.7; }
        .settings-hint {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 8px;
            padding-left: 8px;
            line-height: 1.4;
        }
        
        /* 为了在圆角组件之间有1px间隔，增加下边距并调整背景 */
        .settings-group {
            background: var(--system-input-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        .settings-group .settings-field input, 
        .settings-group .settings-field select, 
        .settings-group .settings-field textarea {
            border-radius: 0;
            border-bottom: 0.5px solid #38383A;
        }
        .settings-group .settings-field:last-child input, 
        .settings-group .settings-field:last-child select, 
        .settings-group .settings-field:last-child textarea {
            border-bottom: none;
        }
    </style>
</head>
<body>
    
<div class="app-container">
    <div class="bg-blur"></div>

    <!-- 拨号视图 -->
    <div id="viewDial" class="view active">
        <div class="dial-content">
            <div class="dial-name">袁朗</div>
            <div id="hint">点击拨号开始语音通话</div>
        </div>
        <div class="dial-actions">
            <button class="btn-call-start" id="btnCall" onclick="startCall()">
                <svg viewBox="0 0 24 24">
                    <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 通话中视图 -->
    <div id="viewCall" class="view">
        <!-- 顶部栏 -->
        <div class="call-topbar">
            <button class="btn-back" id="btnBack" onclick="if(isInCall){toggleCall()}else{switchView('dial')}">
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                </svg>
                返回
            </button>
            <div class="call-topbar-right">
                <button class="btn-settings" onclick="openSettings()">
                    <!-- Apple 风格设置图标 -->
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 中间弹性区域 -->
        <div class="call-body">
        <!-- 头部名字与状态区 -->
        <div class="call-header-area">
            <div class="call-name">袁朗</div>
            <div class="call-status-area">
                <div id="connDot"></div>
                <span id="callStatus">正在连接…</span>
                <span id="callTimer">00:00</span>
            </div>
        </div>

        <!-- 字幕区 -->
        <div class="subtitle-area">
            <div id="userSubtitle"></div>
            <div id="aiSubtitle"></div>
            <div id="statusLine"></div>
            <div id="statsLine"></div>
        </div>
        </div><!-- /call-body -->

        <!-- 文字输入区 -->
        <div id="textInputArea">
            <input type="text" id="textInput" placeholder="输入文字消息…" autocomplete="off" />
            <button class="btn-send" onclick="sendTextInput()">
                <!-- Apple 风格发送飞机 -->
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
        </div>

        <!-- 底部控制栏 -->
        <div class="call-controls">

    <script>// === 主题系统 ===
function getTheme() {
    try { return localStorage.getItem('ui_theme') || 'ios'; } catch(e) { return 'ios'; }
}
function setTheme(name) {
    document.documentElement.setAttribute('data-theme', name);
    try { localStorage.setItem('ui_theme', name); } catch(e) {}
    // 高亮当前选中的主题按钮
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        var isActive = btn.getAttribute('data-theme-val') === name;
        btn.style.background = isActive ? 'var(--system-blue)' : 'var(--system-input-bg)';
        btn.style.fontWeight = isActive ? '600' : '400';
    });
}
// 页面加载时立即应用主题
(function() { setTheme(getTheme()); })();

// === 日志系统 ===
var _logLines = [];
function _ts() { return new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function addLog(level, msg) {
    var line = _ts() + ' [' + level + '] ' + msg;
    _logLines.push(line);
    if (_logLines.length > 500) _logLines = _logLines.slice(-300);
    var el = document.getElementById('logContent');
    if (el) {
        var cls = 'log-' + level.toLowerCase();
        el.innerHTML += '<div class="log-line ' + cls + '"><span class="log-time">' + _ts() + '</span> ' + msg + '</div>';
        el.scrollTop = el.scrollHeight;
    }
}
function copyLog() {
    var text = _logLines.join('\n');
    navigator.clipboard.writeText(text).then(function(){
        addLog('INFO', '日志已复制到剪贴板');
    }).catch(function(){});
}
function clearLog() {
    _logLines = [];
    document.getElementById('logContent').innerHTML = '';
}

// === 环境检测 ===
addLog('INFO', '页面加载 | UA: ' + navigator.userAgent.slice(0, 80));
addLog('INFO', '浏览器: ' + (function(){
    var ua = navigator.userAgent;
    if (ua.indexOf('MicroMessenger') > -1) return '微信内置浏览器 ⚠️';
    if (ua.indexOf('QQBrowser') > -1) return 'QQ浏览器 ⚠️';
    if (ua.indexOf('UCBrowser') > -1) return 'UC浏览器 ⚠️';
    if (ua.indexOf('Quark') > -1) return '夸克浏览器 ⚠️';
    if (ua.indexOf('Firefox') > -1) return 'Firefox ✅';
    if (ua.indexOf('Edg/') > -1) return 'Edge ✅';
    if (ua.indexOf('Chrome') > -1) return 'Chrome ✅';
    if (ua.indexOf('Safari') > -1) return 'Safari ✅';
    return '未知 ⚠️';
})());
addLog('INFO', 'MediaRecorder: ' + (typeof MediaRecorder !== 'undefined' ? '✅ 支持' : '❌ 不支持'));
addLog('INFO', 'getUserMedia: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? '✅ 支持' : '❌ 不支持'));
addLog('INFO', 'AudioContext: ' + (window.AudioContext || window.webkitAudioContext ? '✅ 支持' : '❌ 不支持'));
if (typeof MediaRecorder !== 'undefined') {
    var _codecs = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'];
    var _supported = _codecs.filter(function(c){return MediaRecorder.isTypeSupported(c)});
    addLog('INFO', '录音格式: ' + (_supported.length ? _supported.join(', ') : '❌ 无支持格式'));
}

// === 初始化 ===
const TOKEN = new URLSearchParams(window.location.search).get('token') || '';
if (!TOKEN) { window.location.href = '/'; }
const sessionId = 'vc_' + Date.now();

// 从 URL 参数读取设置（HF Spaces iframe 中 localStorage 被阻止）
const _params = new URLSearchParams(window.location.search);

// 优先从 sessionStorage 读（安全，不暴露在 URL 中）
var _callData = {};
try { var _cd = sessionStorage.getItem('call_data'); if (_cd) _callData = JSON.parse(_cd); } catch(e) {}

const userInfo = _callData.user_info || _params.get('user_info') || '';
const topic = _callData.topic || _params.get('topic') || '';
const extraPrompt = _callData.extra_prompt || _params.get('extra_prompt') || '';
let customLlm = null;
try {
  var _clRaw = _callData.custom_llm || _params.get('custom_llm');
  if (_clRaw) customLlm = typeof _clRaw === 'string' ? JSON.parse(_clRaw) : _clRaw;
} catch(e) {}
let customTts = null;
try {
  var _ctRaw = _callData.custom_tts || _params.get('custom_tts');
  if (_ctRaw) customTts = typeof _ctRaw === 'string' ? JSON.parse(_ctRaw) : _ctRaw;
} catch(e) {}
let ttsApiKey = _callData.tts_api_key || _params.get('tts_api_key') || '';
let selectedModel = _callData.model || _params.get('model') || '';
let maxHistory = parseInt(_callData.max_history || _params.get('max_history') || '20') || 20;

// 构建 custom_prompt
let customPrompt = '';
if (userInfo) customPrompt += '# 关于用户\n' + userInfo + '\n\n';
if (topic) customPrompt += '# 本次话题\n' + topic + '\n\n';
if (extraPrompt) customPrompt += '# 补充设定\n' + extraPrompt + '\n\n';

// === 状态变量 ===
let isInCall = false;
let isMuted = false;
let isAiSpeaking = false;
let isPlaying = false;
let isListening = false;
let audioQueue = [];
let currentAiText = '';
let callStartTime = null;
let timerInterval = null;
let mediaRecorder = null;
let audioChunks = [];
let mediaStream = null;
let audioContext = null;
let analyser = null;
let silenceTimer = null;
let silenceStart = null;
let hasVoiceActivity = false;
let voiceFrameCount = 0;
let recordStartTime = 0;
const SILENCE_THRESHOLD = 15;
const SILENCE_DURATION = 1500;
const MIN_RECORD_TIME = 500;

// === 视图切换 ===
function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// === cleanVoiceTags ===
function cleanVoiceTags(text) {
    // 过滤所有括号内的英文语气词标签，如 (laughs) (hmm) (uh) (oh) 等
    let c = text.replace(/\([a-zA-Z\s\-]+\)/g, '');
    // 过滤停顿标签 <#0.5#>
    c = c.replace(/<#[\d.]+#>/g, '');
    return c.replace(/\s{2,}/g, ' ').trim();
}

// === SSE 发送 ===
function sendText(text) {
    addLog('INFO', '发送文本: ' + text.slice(0, 50));
    const body = { text, session_id: sessionId, token: TOKEN };
    if (customPrompt) body.custom_prompt = customPrompt;
    if (selectedModel) body.model = selectedModel;
    if (maxHistory) body.max_history = maxHistory;
    if (customLlm && customLlm.base_url && customLlm.api_key) body.custom_api = customLlm;
    if (customTts && customTts.api_key) body.custom_tts = customTts;
    if (ttsApiKey) body.tts_api_key = ttsApiKey;

    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(resp => {
        addLog('INFO', 'SSE 响应: HTTP ' + resp.status);
        if (resp.status === 401) {
            resp.json().then(data => {
                alert(data.error || '会话已过期，请重新登录');
                window.location.href = '/';
            }).catch(() => {
                alert('会话已过期，请重新登录');
                window.location.href = '/';
            });
            return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        function pump() {
            reader.read().then(({ done, value }) => {
                if (done) return;
                buf += decoder.decode(value, { stream: true });
                const lines = buf.split('\n');
                buf = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') return;
                        try { handleMessage(JSON.parse(data)); } catch(e) {}
                    }
                }
                pump();
            });
        }
        pump();
    }).catch(err => {
        console.error('SSE error:', err);
        addLog('ERROR', 'SSE 网络错误: ' + err.message);
        document.getElementById('aiSubtitle').textContent = '⚠️ 网络连接失败';
        document.getElementById('statusLine').textContent = '';
        isAiSpeaking = false;
        isPlaying = false;
        resumeListening();
    });
}

// === 消息处理 ===
function handleMessage(msg) {
    switch (msg.type) {
        case 'user_confirmed':
            addLog('INFO', '✅ 服务端已收到文本');
            document.getElementById('userSubtitle').textContent = '你: ' + msg.text;
            document.getElementById('statusLine').textContent = '已收到，正在处理...';
            isAiSpeaking = true;
            pauseListening();
            break;
        case 'status':
            document.getElementById('statusLine').textContent = msg.message || '';
            break;
        case 'text_delta':
            currentAiText += msg.text;
            document.getElementById('aiSubtitle').textContent = cleanVoiceTags(currentAiText);
            break;
        case 'audio':
            addLog('DEBUG', 'TTS 音频 #' + msg.index + ' (' + (msg.audio||'').length + ' bytes)');
            audioQueue.push({ audio: msg.audio, text: msg.text, index: msg.index });
            playNext();
            break;
        case 'done':
            addLog('INFO', '✅ LLM 完成 | ' + (msg.stats ? msg.stats.sentences + '句TTS' : ''));
            document.getElementById('statusLine').textContent = '';
            if (msg.stats) {
                let s = msg.stats;
                let info = '总耗时 ' + s.total_time + 's';
                if (s.first_token_time) info += ' | 首token ' + s.first_token_time + 's';
                info += ' | LLM ' + s.llm_time + 's | ' + s.sentences + '句TTS';
                document.getElementById('statsLine').textContent = info;
            }
            if (!isPlaying && audioQueue.length === 0) { isAiSpeaking = false; resumeListening(); }
            break;
        case 'tts_error':
            addLog('ERROR', 'TTS 失败: ' + msg.text);
            document.getElementById('statusLine').textContent = '⚠️ 语音合成失败: ' + msg.text;
            break;
        case 'error':
            addLog('ERROR', '服务端错误: ' + msg.message);
            document.getElementById('aiSubtitle').textContent = '⚠️ ' + msg.message;
            document.getElementById('statusLine').textContent = '';
            isAiSpeaking = false;
            resumeListening();
            break;
    }
}

// === 音频播放队列 ===
function playNext() {
    if (isPlaying || audioQueue.length === 0) return;
    isPlaying = true;
    const item = audioQueue.shift();
    addLog('DEBUG', '播放音频 #' + item.index);
    const bytes = Uint8Array.from(atob(item.audio), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.volume = 1.0;
    pauseListening();
    audio.onended = audio.onerror = () => {
        if (audio.error) addLog('WARN', '音频播放出错: ' + (audio.error.message || audio.error.code));
        URL.revokeObjectURL(url);
        isPlaying = false;
        if (audioQueue.length > 0) { playNext(); }
        else { isAiSpeaking = false; resumeListening(); }
    };
    audio.play().catch((e) => { addLog('ERROR', '音频 play() 失败: ' + e.message); isPlaying = false; playNext(); });
}

// === 录音 + VAD ===
function initRecognition() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        addLog('ERROR', '浏览器不支持 getUserMedia');
        document.getElementById('hint').textContent = '⚠️ 浏览器不支持录音';
        return false;
    }
    addLog('INFO', '请求麦克风权限...');
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        addLog('INFO', '✅ 麦克风权限已获取');
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        document.getElementById('hint').textContent = '🎤 麦克风就绪';
        startRecording();
    }).catch((e) => {
        addLog('ERROR', '麦克风权限被拒绝: ' + e.message);
        document.getElementById('hint').textContent = '⚠️ 麦克风权限被拒绝，请打字输入';
    });
    return true;
}

function startRecording() {
    if (!mediaStream || !isInCall || isMuted || isAiSpeaking) return;
    audioChunks = [];
    recordStartTime = Date.now();
    hasVoiceActivity = false;
    voiceFrameCount = 0;
    let mimeType = 'audio/webm;codecs=opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/webm';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'audio/mp4';
    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = '';
    try {
        mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : {});
    } catch(e) { return; }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const dur = Date.now() - recordStartTime;
        if (dur < MIN_RECORD_TIME || audioChunks.length === 0 || !hasVoiceActivity) {
            audioChunks = [];
            if (isInCall && !isMuted && !isPlaying && !isAiSpeaking) setTimeout(startRecording, 200);
            return;
        }
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        audioChunks = [];
        if (blob.size < 1000) { if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 200); return; }
        document.getElementById('userSubtitle').textContent = '🎤 识别中...';
        document.getElementById('statusLine').textContent = '语音识别中...';
        addLog('INFO', '发送录音到 STT (' + blob.size + ' bytes)');
        const fd = new FormData();
        fd.append('audio', blob, 'recording.webm');
        fetch('/api/recognize', { method: 'POST', body: fd }).then(r => r.json()).then(result => {
            if (result.error) { addLog('ERROR', 'STT 错误: ' + result.error); document.getElementById('statusLine').textContent = '⚠️ ' + result.error; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 500); return; }
            const text = (result.text || '').trim();
            if (!text) { addLog('DEBUG', 'STT 返回空（静音）'); document.getElementById('userSubtitle').textContent = ''; document.getElementById('statusLine').textContent = ''; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 200); return; }
            addLog('INFO', 'STT 识别: 「' + text.slice(0,30) + '」 (' + (result.engine||'?') + ', ' + (result.time||'?') + 's)');
            document.getElementById('userSubtitle').textContent = '你: ' + text;
            var engineInfo = result.engine ? ' (' + result.engine + ')' : '';
            document.getElementById('statusLine').textContent = '识别耗时 ' + (result.time||'?') + 's' + engineInfo + ' | 发送中...';
            document.getElementById('statsLine').textContent = '';
            currentAiText = '';
            document.getElementById('aiSubtitle').textContent = '';
            sendText(text);
        }).catch(() => { document.getElementById('statusLine').textContent = '⚠️ 网络错误'; if (isInCall && !isMuted && !isPlaying) setTimeout(startRecording, 1000); });
    };
    mediaRecorder.start(100);
    isListening = true;
    silenceStart = null;
    startSilenceDetection();
}

function startSilenceDetection() {
    if (silenceTimer) clearInterval(silenceTimer);
    silenceTimer = setInterval(() => {
        if (!analyser || !mediaRecorder || mediaRecorder.state !== 'recording') { clearInterval(silenceTimer); return; }
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const vol = data.reduce((a, b) => a + b, 0) / data.length;
        if (vol > SILENCE_THRESHOLD) { silenceStart = null; voiceFrameCount++; if (voiceFrameCount >= 3) hasVoiceActivity = true; }
        else { if (!silenceStart) silenceStart = Date.now(); else if (Date.now() - silenceStart > SILENCE_DURATION && Date.now() - recordStartTime > MIN_RECORD_TIME) { clearInterval(silenceTimer); stopRecording(); } }
    }, 100);
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    isListening = false;
    if (silenceTimer) { clearInterval(silenceTimer); silenceTimer = null; }
}
function startListening() { if (isListening || isMuted || !isInCall || isAiSpeaking) return; if (mediaStream) startRecording(); }
function pauseListening() { stopRecording(); }
function resumeListening() { if (!isInCall || isMuted || isAiSpeaking) return; setTimeout(startListening, 800); }

// === 控制按钮 ===
function startCall() {
    switchView('call');
    if (!isInCall) toggleCall();
}

function toggleCall() {
    if (!isInCall) {
        isInCall = true;
        document.getElementById('btnCall').classList.add('active');
        document.getElementById('hint').textContent = '连接中...';
        document.getElementById('callStatus').style.display = 'none';
        document.getElementById('callTimer').style.display = 'block';
        document.getElementById('textInputArea').style.display = 'flex';
        callStartTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
        if (!mediaStream) { initRecognition(); } else { startListening(); }
        updateStatus('connected', '已连接');
    } else {
        isInCall = false;
        document.getElementById('btnCall').classList.remove('active');
        document.getElementById('hint').textContent = '通话已结束';
        document.getElementById('callStatus').style.display = 'block';
        document.getElementById('callTimer').style.display = 'none';
        document.getElementById('textInputArea').style.display = 'none';
        clearInterval(timerInterval);
        pauseListening();
        audioQueue = [];
        isPlaying = false;
        isAiSpeaking = false;
        updateStatus('disconnected', '未连接');
    }
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('btnMute').classList.toggle('active', isMuted);
    if (isMuted) { pauseListening(); document.getElementById('hint').textContent = '已静音'; }
    else if (isInCall) startListening();
}

function toggleSpeaker() { document.getElementById('btnSpeaker').classList.toggle('active'); }

function sendTextInput() {
    if (isAiSpeaking || isPlaying) {
        document.getElementById('statusLine').textContent = '请等对方说完...';
        return;
    }
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !isInCall) return;
    input.value = '';
    document.getElementById('userSubtitle').textContent = '你: ' + text;
    document.getElementById('statusLine').textContent = '发送中...';
    document.getElementById('statsLine').textContent = '';
    currentAiText = '';
    document.getElementById('aiSubtitle').textContent = '';
    sendText(text);
}

// === UI辅助 ===
function updateStatus(state, text) {
    const dot = document.getElementById('connDot');
    dot.className = 'conn-dot ' + state;
    const el = document.getElementById('callStatus');
    el.innerHTML = '';
    el.appendChild(dot);
    el.append(' ' + text);
}

function updateTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('callTimer').textContent = m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
}

// textInput回车发送
document.getElementById('textInput').addEventListener('keydown', e => { if (e.key === 'Enter') { sendTextInput(); e.preventDefault(); } });

// === 设置弹窗 ===
var _settingsModelLoaded = false;

function openSettings() {
    // 高亮当前主题按钮
    var currentTheme = getTheme();
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        var isActive = btn.getAttribute('data-theme-val') === currentTheme;
        btn.style.background = isActive ? 'var(--system-blue)' : 'var(--system-input-bg)';
        btn.style.fontWeight = isActive ? '600' : '400';
    });

    // 填充当前值
    document.getElementById('settingsUserInfo').value = _params.get('user_info') || '';
    document.getElementById('settingsTopic').value = _params.get('topic') || '';
    document.getElementById('settingsExtraPrompt').value = _params.get('extra_prompt') || '';
    document.getElementById('settingsMaxHistory').value = maxHistory;

    // 内置模型
    if (!_settingsModelLoaded) {
        loadSettingsBuiltinModels();
        _settingsModelLoaded = true;
    }

    // LLM
    if (customLlm) {
        document.getElementById('settingsLlmUrl').value = customLlm.base_url || '';
        document.getElementById('settingsLlmKey').value = customLlm.api_key || '';
        document.getElementById('settingsLlmModel').value = customLlm.model || '';
    }

    // TTS
    if (customTts) {
        document.getElementById('settingsTtsKey').value = customTts.api_key || '';
        document.getElementById('settingsTtsGroupId').value = customTts.group_id || '';
        document.getElementById('settingsTtsVoiceId').value = customTts.voice_id || '';
        if (customTts.model) document.getElementById('settingsTtsModel').value = customTts.model;
    }

    document.getElementById('settingsOverlay').classList.add('active');
}

function loadSettingsBuiltinModels() {
    var sel = document.getElementById('settingsBuiltinModel');
    sel.innerHTML = '<option value="" disabled selected>加载中...</option>';
    fetch('/api/builtin-models').then(r => r.json()).then(data => {
        var models = data.models || [];
        if (models.length === 0) {
            sel.innerHTML = '<option value="">无可用模型</option>';
            return;
        }
        sel.innerHTML = '';
        models.forEach(function(m) {
            var id = typeof m === 'string' ? m : (m.id || m.name || '');
            var opt = document.createElement('option');
            opt.value = id;
            opt.textContent = id;
            if (id === selectedModel) opt.selected = true;
            sel.appendChild(opt);
        });
    }).catch(function() {
        sel.innerHTML = '<option value="">获取失败</option>';
    });
}

function settingsFetchLlmModels() {
    var url = document.getElementById('settingsLlmUrl').value.trim();
    var key = document.getElementById('settingsLlmKey').value.trim();
    var errEl = document.getElementById('settingsLlmModelError');
    errEl.style.display = 'none';
    if (!url || !key) {
        errEl.textContent = '请先填写 API 地址和 Key';
        errEl.style.display = 'block';
        return;
    }
    fetch('/api/models?base_url=' + encodeURIComponent(url) + '&api_key=' + encodeURIComponent(key))
        .then(r => r.json())
        .then(data => {
            var models = data.models || [];
            if (models.length === 0) throw new Error('空列表');
            var input = document.getElementById('settingsLlmModel');
            var currentVal = input.value;
            var sel = document.createElement('select');
            sel.id = 'settingsLlmModel';
            sel.style.cssText = input.style.cssText;
            sel.className = input.className;
            var empty = document.createElement('option');
            empty.value = '';
            empty.textContent = '请选择...';
            sel.appendChild(empty);
            models.forEach(function(m) {
                var id = typeof m === 'string' ? m : (m.id || '');
                var opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                if (id === currentVal) opt.selected = true;
                sel.appendChild(opt);
            });
            input.parentNode.replaceChild(sel, input);
        })
        .catch(function(e) {
            errEl.textContent = '获取失败: ' + e.message;
            errEl.style.display = 'block';
        });
}

function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
}

function saveSettings() {
    // 更新运行时变量
    var uInfo = document.getElementById('settingsUserInfo').value;
    var tp = document.getElementById('settingsTopic').value;
    var ep = document.getElementById('settingsExtraPrompt').value;

    // 重建 customPrompt
    customPrompt = '';
    if (uInfo) customPrompt += '# 关于用户\n' + uInfo + '\n\n';
    if (tp) customPrompt += '# 本次话题\n' + tp + '\n\n';
    if (ep) customPrompt += '# 补充设定\n' + ep + '\n\n';

    // 对话记忆
    var mh = parseInt(document.getElementById('settingsMaxHistory').value) || 20;
    maxHistory = Math.max(1, Math.min(100, mh));

    // 内置模型
    var builtinSel = document.getElementById('settingsBuiltinModel');
    if (builtinSel && builtinSel.value) {
        selectedModel = builtinSel.value;
    }

    // LLM
    var llmUrl = document.getElementById('settingsLlmUrl').value.trim();
    var llmKey = document.getElementById('settingsLlmKey').value.trim();
    var llmModelEl = document.getElementById('settingsLlmModel');
    var llmModel = llmModelEl ? llmModelEl.value.trim() : '';
    if (llmUrl && llmKey) {
        customLlm = { base_url: llmUrl, api_key: llmKey, model: llmModel };
    } else {
        customLlm = null;
    }

    // TTS
    var ttsKey = document.getElementById('settingsTtsKey').value.trim();
    var ttsGroupId = document.getElementById('settingsTtsGroupId').value.trim();
    var ttsVoiceId = document.getElementById('settingsTtsVoiceId').value.trim();
    var ttsModel = document.getElementById('settingsTtsModel').value;
    if (ttsKey) {
        customTts = { api_key: ttsKey };
        if (ttsGroupId) customTts.group_id = ttsGroupId;
        if (ttsVoiceId) customTts.voice_id = ttsVoiceId;
        if (ttsModel) customTts.model = ttsModel;
    } else {
        customTts = null;
    }

    closeSettings();
    // 显示保存确认
    document.getElementById('statusLine').textContent = '✅ 设置已保存并应用';
    setTimeout(function() {
        var sl = document.getElementById('statusLine');
        if (sl.textContent === '✅ 设置已保存并应用') sl.textContent = '';
    }, 2000);
}
</script>
