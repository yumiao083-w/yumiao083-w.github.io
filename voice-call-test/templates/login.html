<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>语音通话 — 密钥验证</title>
<style>
/* 苹果原生的基础重置与字体设置 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  min-height: 100%;
  background: #E5E5EA; /* 桌面端展示时的外部背景色 */
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* 内部应用容器（适配多尺寸屏幕） */
.app-container {
  background: #F2F2F7; /* iOS 系统级浅灰背景 */
  width: 100%;
  max-width: 480px; /* 限制最大宽度，完美适配各类屏幕 */
  min-height: 100vh; /* 自动撑满屏幕高度 */
  margin: 0 auto; /* PC 端居中显示 */
  position: relative;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(0,0,0,0.05); /* 为 PC 端增加一点层次感阴影 */
}

/* 页面内容区 */
.content {
  flex: 1;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  margin-top: 80px; /* 增加顶部边距，留出呼吸感 */
}

/* iOS Large Title 大标题 */
.large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 0.37px;
  color: #000;
  line-height: 1.2;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 15px;
  color: #8E8E93;
  margin-bottom: 32px;
}

/* iOS 系统分组列表样式 (Grouped Table View) */
.ios-input-group {
  background: #FFFFFF;
  border-radius: 10px;
  padding: 4px 16px;
  margin-bottom: 24px;
}

.input-key {
  width: 100%;
  height: 44px;
  border: none;
  background: transparent;
  font-size: 17px;
  color: #000;
  outline: none;
  font-family: inherit;
}

.input-key::placeholder {
  color: #C7C7CC; /* iOS 原生占位符颜色 */
}

/* 主操作按钮（黑白配色） */
.btn-primary {
  width: 100%;
  height: 50px;
  background: #000000; /* 改为纯黑背景 */
  color: #FFFFFF; /* 改为纯白文字 */
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
}

.btn-primary:active {
  opacity: 0.5; /* 原生点击反馈 */
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.error-msg {
  color: #FF3B30; /* iOS 系统红（错误提示保留红色以保障体验） */
  font-size: 13px;
  margin-top: 12px;
  text-align: center;
  min-height: 18px;
}

/* 底部操作区 */
.bottom-actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.divider-text {
  font-size: 13px;
  color: #8E8E93;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}

/* 访客按钮（黑白配色） */
.btn-guest {
  background: transparent;
  color: #000000; /* 改为纯黑文字 */
  border: none;
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-guest:active {
  opacity: 0.5;
}

.guest-hint {
  font-size: 13px;
  color: #8E8E93;
  margin-top: 8px;
}

.footer {
  text-align: center;
  font-size: 13px;
  color: #8E8E93;
  margin-top: auto;
  margin-bottom: 40px;
}

/* iOS 底部 Home 横条 */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: #000;
  border-radius: 100px;
  z-index: 100;
}
</style>
</head>
<body>

<div class="app-container">
  
    <!-- 核心交互区 -->
    <div class="content">
      <!-- iOS 标准的大标题布局 -->
      <div class="large-title">给袁朗打<br>一通电话吧</div>
      <div class="subtitle">输入体验密钥以验证身份</div>
      
      <!-- iOS 标准分组输入框 -->
      <div class="ios-input-group">
        <input class="input-key" id="keyInput" type="text" placeholder="密钥" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">验证并进入</button>
      <div class="error-msg" id="errorMsg"></div>
      
      <div class="bottom-actions">
        <div class="divider-text">或</div>
        <button class="btn-guest" onclick="doGuestLogin()">使用自己的 API 进入</button>
        <div class="guest-hint">需要自备 LLM 和 TTS 的 API Key</div>
      </div>

      <div class="footer">一次性密钥 · 刷新后需重新验证</div>
    </div>

    <!-- 仿真 Home 触控条 -->
    <div class="home-indicator"></div>

</div>

<script>
// 所有 JS 逻辑完全原样保留，未做任何修改
var keyInput = document.getElementById('keyInput');
var loginBtn = document.getElementById('loginBtn');
var errorMsg = document.getElementById('errorMsg');

keyInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  var key = keyInput.value.trim();
  if (!key) {
    errorMsg.textContent = '请输入密钥';
    return;
  }
  errorMsg.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = '验证中...';
  try {
    var res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: key })
    });
    var result = await res.json();
    if (result.token) {
      window.location.href = '/setup?token=' + result.token;
    } else if (result.error) {
      errorMsg.textContent = result.error;
    } else {
      errorMsg.textContent = '验证失败，请重试';
    }
  } catch (e) {
    errorMsg.textContent = '网络错误，请重试';
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = '验证并进入';
  }
}

async function doGuestLogin() {
  errorMsg.textContent = '';
  try {
    var res = await fetch('/api/guest-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    var result = await res.json();
    if (result.token) {
      window.location.href = '/setup?token=' + result.token + '&guest=1';
    } else {
      errorMsg.textContent = '获取访客令牌失败';
    }
  } catch (e) {
    errorMsg.textContent = '网络错误，请重试';
  }
}
</script>
</body>
</html>
